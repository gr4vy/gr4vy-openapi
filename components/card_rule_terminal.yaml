---
title: Terminal Card Rule
type: object
description: |-
  A terminal rule in a ruleset. It the payment services to use in case the
  ruleset reaches this node.

x-tags:
  - Card Rulesets

required:
  - type
  - id
  - rule_type
  - payment_service_ids

properties:
  type:
    type: string
    description: "`card-rule`"
    example: card-rule
    enum:
      - card-rule
  id:
    type: string
    description: A unique ID for this rule in the ruleset
    example: "0"

  rule_type:
    type: string
    description: "`terminal`"
    example: terminal
    enum:
      - terminal

  payment_service_ids:
    type: array
    description: |-
      A list of IDs for the payment services to use, in order of priority.
      The payment services all need to process cards.
    example:
      - stripe-card-f47db210-8e30-4f74-8123-b834604f2042
      - card-braintree-0bb93ab0-86ef-4ad5-addf-b69913128d96
    items:
      type: string
