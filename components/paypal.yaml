---
title: PayPal Account
description: A stored PayPal account
type: object
x-tags:
  - Payment Methods

properties:
  type:
    type: string
    description: "`payment-method`"
    example: payment-method
    enum:
      - payment-method

  id:
    type: string
    description: |-
      The optional ID of the payment method details. This will be `null` if the
      payment method was not tokenized on only used in a one-off transaction.
    format: uuid
    example: 77a76f7e-d2de-4bbc-ada9-d6a0015e6bd5
    nullable: true

  status:
    type: string
    description: |-
      The state of the payment method in Gr4vy.
    example: created

  payment_method_status:
    type: string
    description: |-
      The state of the account tokenization. After the first call this will
      be set to `buyer_authorization_required` and the response will include
      an `authorization_url`. The buyer needs to be redirected to this URL
      to authorize the future payments. The token is subsequently posted to
      the [authorize](/#operation/authorize-payment-method) endpoint
      after which the `status` is updated to `stored`.
    example: buyer_authorization_required
    enum:
      - stored
      - buyer_authorization_required

  method:
    type: string
    description: "`paypal`"
    example: paypal
    enum:
      - paypal

  created_at:
    type: string
    description: |-
      The date and time when this payment method was first created in our
      system.
    format: date-time
    example: "2013-07-16T19:23:00.000Z"

  updated_at:
    type: string
    description: |-
      The date and time when this payment method was last updated in our system.
    format: date-time
    example: "2013-07-16T19:23:00.000Z"

  external_identifier:
    type: string
    description: |-
      An external identifier that can be used to match the payment method
      against your own records.
    example: user-789123
    nullable: true

  buyer:
    allOf:
      - $ref: "../openapi.yaml#/components/schemas/Buyer"
      - description: |-
          The optional buyer for which this payment method has been stored.
      - nullable: true

  details:
    $ref: |-
      ../openapi.yaml#/components/schemas/PayPalDetails
