openapi: 3.0.0
info:
  version: 1.0.0
  title: Processing APIs
servers:
  - url: 'https://{{cluster}}'
paths:
  /authorizations:
    post:
      summary: Create an authorization
      operationId: createAuthorization
      
      responses:
        '200':
          description: |-
            Returns a mini representation of a new authorization resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Authorization'
        default:
          description: |-
            An unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  schemas:
    Authorization:
      type: object
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: |-
            The unique ID that will be used to create a new authorization
          example: |-
            8724fd24-5489-4a5d-90fd-0604df7d3b83
        
        type:
          type: string

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string