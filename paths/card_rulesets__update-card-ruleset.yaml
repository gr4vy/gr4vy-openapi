---
operationId: update-card-ruleset
summary: Update card ruleset
description: Updates a ruleset that can be used for card transactions.
tags: ["Card Rulesets"]
x-internal: true

requestBody:
  content:
    application/json:
      schema:
        $ref: "../openapi.yaml#/components/schemas/CardRulesetUpdateRequest"
      examples:
        A valid ruleset:
          value:
            display_name: Q2 2020 Ruleset
            root_rule_id: "0"
            rules:
              - type: card-rule
                id: "0"
                rule_type: conditional
                key: amount
                condition: ">="
                value: "200"
                true_rule_id: "1"
                false_rule_id: "2"
              - type: card-rule
                id: "1"
                rule_type: terminal
                payment_service_ids:
                  - stripe-card-f47db210-8e30-4f74-8123-b834604f2042
              - type: card-rule
                id: "2"
                rule_type: terminal
                payment_service_ids:
                  - card-braintree-0bb93ab0-86ef-4ad5-addf-b69913128d96

responses:
  "200":
    description: An updated ruleset
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/CardRuleset"
        examples:
          A newly created ruleset:
            value:
              type: ruleset
              id: 8d3fe99b-1422-42e6-bbb3-932d95ae5f79
              display_name: Q2 2020 Ruleset
              active: true
              valid: true
              root_rule_id: "0"
              created_at: "2012-12-12T10:53:43-08:00"
              updated_at: "2012-12-12T10:53:43-08:00"
              rules:
                - type: card-rule
                  id: "0"
                  rule_type: conditional
                  key: amount
                  condition: ">="
                  value: "200"
                  true_rule_id: "1"
                  false_rule_id: "2"
                - type: card-rule
                  id: "1"
                  rule_type: terminal
                  payment_service_ids:
                    - stripe-card-f47db210-8e30-4f74-8123-b834604f2042
                - type: card-rule
                  id: "2"
                  rule_type: terminal
                  payment_service_ids:
                    - card-braintree-0bb93ab0-86ef-4ad5-addf-b69913128d96

  "400":
    description:
      Returns an error if the request was badly formatted or missing required
      fields.
    content:
      application/json:
        schema:
          oneOf:
            - $ref: |-
                ../openapi.yaml#/components/schemas/Error400BadRequest
            - $ref: |-
                ../openapi.yaml#/components/schemas/Error400IncorrectJson

  "401":
    description: Returns an error if no valid authentication was provided.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error401Unauthorized"

  "404":
    description: Returns an error if the resource can not be found.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error404NotFound"
