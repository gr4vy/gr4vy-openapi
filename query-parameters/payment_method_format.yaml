---
schema:
  type: string
  example: full
  default: full
  enum:
    - full
    - token
in: query
name: format
description: |-
  Determines the format of the payment method returned. Currently we have 2
  available formats:

  * `full` - Returns the default full format of a resource.
  * `token` - Returns only the payment method's token and details. This is used
     by Gr4vy Embed to render available payment options.
