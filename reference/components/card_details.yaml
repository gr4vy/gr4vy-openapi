---
title: Card details
description: Additional details about a registered card
type: object
x-tags:
  - Payment Methods

properties:
  number:
    type: string
    description: |-
      Partial number details for a registered card, hiding all but the last few
      numbers.
    example: XXXX XXXX XXXX 1111

  type:
    type: string
    example: visa
    enum:
      - visa
      - mastercard
      - american-express
      - diners-club
      - discover
      - jcb
      - unionpay
      - maestro
      - elo
      - mir
      - hiper
      - hipercard
    description: |-
      The type of the card.

  expiration_date:
    type: string
    description: |-
      The expiration date for a card.
    example: "11 / 21"
