---
# yamllint disable rule:line-length
title: Card Ruleset (Update)
type: object
description: |-
  Updates a card ruleset which holds the rules that are parsed for a card
  transaction.
x-internal: true
x-tags:
  - Card Rulesets

required:
  - display_name
  - root_rule_id
  - rules

properties:
  display_name:
    type: string
    description: The display name of the ruleset
    example: Q2 2020 Ruleset
  root_rule_id:
    type: string
    example: "0"
    description: The ID of the rule that is the starting point of the ruleset.
  rules:
    type: array
    description: A list of rules in this ruleset
    items:
      oneOf:
        - $ref: "../openapi.yaml#/components/schemas/CardRuleStringConditional"
        - $ref: "../openapi.yaml#/components/schemas/CardRuleNumberConditional"
        - $ref: "../openapi.yaml#/components/schemas/CardRuleBooleanConditional"
        - $ref: "../openapi.yaml#/components/schemas/CardRulePaymentServicesTerminal"
