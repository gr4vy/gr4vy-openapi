---
title: Payment Service (Create)
type: object
description: Request body for activating a payment service

x-tags:
  - Request Bodies

required:
  - display_name
  - payment_service_definition_id
  - fields
  - accepted_currencies
  - use_test_environment
  - accepted_countries

properties:
  display_name:
    type: string
    description:
      A custom name for the payment service. This will be shown in the Admin UI.
    example: Stripe (USA)
    minLength: 1
    maxLength: 50

  payment_service_definition_id:
    type: string
    description: The ID of the payment service to use
    example: stripe-card
    minLength: 1
    maxLength: 50

  fields:
    type: array
    description: |-
      A list of fields, each containing a key-value pair for each field defined
      by the service for this payment service. All the required fields for a
      definition should be posted here.
    items:
      type: object
      description:
        A field containing a key-value pair for a field defined by the
        definition for this payment service.
      properties:
        key:
          type: string
          description: The key of the field to set a value for.
          example: private_key
          minLength: 1
          maxLength: 50

        value:
          type: string
          description: The value of a field to set.
          example: sk_test_4eC39HqLyjWDarjtT1zdp7dc
          minLength: 1
          maxLength: 1500

      required:
        - key
        - value

  accepted_countries:
    type: array
    description:
      A list of countries that this payment service needs to support in ISO
      two-letter code format.
    minItems: 1
    items:
      type: string
      minLength: 2
      maxLength: 2
    example:
      - US
      - GB
      - DE

  accepted_currencies:
    type: array
    description:
      A list of currencies that this payment service needs to support in ISO
      4217 three-letter code format.
    minItems: 1
    items:
      type: string
      minLength: 3
      maxLength: 3
    example:
      - EUR
      - USD
      - GBP

  use_test_environment:
    type: boolean
    description:
      Defines if this payment service uses the service's test or sandbox
      environment.
    example: false
