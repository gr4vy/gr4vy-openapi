---
title: PayPal Account (Register)
type: object
description: A request to tokenize a PayPal account.

x-tags:
  - Request Bodies

required:
  - method
  - redirect_url

properties:
  method:
    type: string
    description: "`paypal`"
    example: paypal
    enum:
      - paypal

  redirect_url:
    type: string
    format: uri
    description: |-
      The redirect URL to redirect a buyer to after they have authorized their
      PayPal transaction. This needs to match the URL registered for your PayPal
      application.
    example: https://example.com/callback

  external_identifier:
    type: string
    description:
      An external identifier that can be used to match the account against your
      own records.
    example: user-789123
    nullable: true
