properties:
  refresh_token:
    type: string
    description: |-
      The refresh token that is used to create a new access token.
    example: nJoZ3ExaVNyQWw6WjRsanRKZG5lQk9qUE1BVQ3FIOG9vSGV4VHo4QzAyg5T1JvNc
