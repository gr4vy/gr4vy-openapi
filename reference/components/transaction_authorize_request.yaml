---
title: Authorize (Create)
type: object
description: A request to authorize a transaction

x-tags:
  - Request Bodies

properties:
  amount:
    type: number
    description: |-
      The (partial) amount to capture.

      When left blank, this will capture the entire amount.
    minimum: 0.000001
    maximum: 99999999
    example: 1299

  currency:
    type: string
    description: |
      A supported ISO-4217 currency code.
    example: USD

  external_identifier:
    type: string
    example: user-789123
    description:
      An external identifier that can be used to match the transaction against
      your own records.
