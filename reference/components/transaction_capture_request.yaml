---
title: Capture a transaction
type: object
description: A request to capture a transaction

x-tags:
  - Request Bodies

required:
  - amount
  - currency

properties:
  amount:
    type: number
    description: |-
      The (partial) amount to capture.

      When left blank, this will capture the entire amount.
    minimum: 0.000001
    maximum: 99999999
    example: 1299

  currency:
    type: string
    description: |
      A supported ISO-4217 currency code.
    example: USD

  external_identifier:
    type: string
    example: user-789123
    description:
      An external identifier that can be used by the merchant to match the
      capture against their own records.
