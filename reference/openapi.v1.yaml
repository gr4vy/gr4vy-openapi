    Card-Create:
      title: Card (Create)
      type: object
      properties:
        number:
          type: string
          minLength: 14
          maxLength: 16
          example: '4111111111111111'
          pattern: '^[0-9]{14,16}$'
          description: |-
            The 15-16 digit number for this credit card as it can be found on the front of the card.

            If a card has been stored with us previously, this number will represent the unique tokenized card ID provided via our API.
        expiration_date:
          type: string
          description: |-
            The expiration date of the card, formatted `MM/YYYY`. If a card has been previously stored with us this value is optional.

            If the `number` of this card represents a tokenized card, then this value is ignored.
          example: 11/2015
          pattern: "^\\d\\d/\\d\\d\\d\\d$"
          minLength: 7
          maxLength: 7
        security_code:
          type: string
          description: |-
            The 3 or 4 digit security code often found on the card. This often referred to as the CVV or CVD.

            If the `number` of this card represents a tokenized card, then this value is ignored.
          pattern: "^\\d{3,4}$"
          minLength: 3
          maxLength: 4
          example: '123'
