openapi: 3.0.0
info:
  title: Gr4vy API
  version: '1.0'
  contact:
    name: Gr4vy Support
    email: support@gr4vy.com
    url: 'https://gr4vy.com'
  termsOfService: 'https://gr4vy.com'
  license:
    name: MIT
  description: The Gr4vy API
servers:
  - url: 'https://{cluster}'
    variables:
      cluster:
        default: api.gr4vy.com
        description: "The custom domain for the customer's cluster."
tags:
  - name: Authorizations
  - name: Cards
  - name: Transactions
paths:
  /transactions/authorizations:
    post:
      summary: Create an authorization
      tags:
        - Authorizations
      responses:
        '202':
          description: 'This API returns asynchronously, returning status object with the ID of the pending `Authorization` resource.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
              examples:
                Request accepted:
                  value:
                    type: status
                    status: pending
                    resource_type: transactions.authorization
                    resource_id: 8724fd24-5489-4a5d-90fd-0604df7d3b83
        '400':
          description: 'Returns an error if the request is missing any required fields, or the request body is not valid JSON.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Incorrect JSON:
                  value:
                    type: error
                    code: incorrect_json
                    status: 400
                    message: The request body was not valid JSON.
                    documentation_url: 'https://developer.gr4vy.com/errors/incorrect-json'
                    additional_context: null
        '401':
          description: Returns an error if no valid authentication was provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                An unauthorized request:
                  value:
                    type: error
                    code: unauthorized
                    status: 401
                    message: No valid API authentication found
                    documentation_url: 'https://developer.gr4vy.com/errors/unauthorized'
                    additional_context: null
      operationId: post-transactions-authorizations
      description: |-
        Creates an authorization on a card.

        This API can perform a few additional actions at the same time as creating the authorization.

        * `card.store` - Use this method to store the card for furture use
        * `capture` - Use this method to also perform a capture on the card after it has been authorized.

        This API returns asynchronously, returning a pending `Status` object with the ID of the pending authorization.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Authorization-Create'
            examples:
              Authorize a new card:
                value:
                  amount: 1299
                  currency: USD
                  payment_method_type: card
                  payment_method:
                    number: '4111111111111111'
                    expiration_date: 11/2025
                    security_code: '123'
              Authorize a tokenized card:
                value:
                  amount: '1299'
                  currency: USD
                  card:
                    number: '01231231231231'
              Authorized and tokenize a card:
                value:
                  amount: 1299
                  currency: USD
                  payment_method_type: card
                  payment_method:
                    number: '4111111111111111'
                    expiration_date: 11/2025
                    security_code: '123'
                    store: true
              'Authorize, capture, and tokenize a card':
                value:
                  amount: 1299
                  currency: USD
                  payment_method_type: card
                  capture: true
                  payment_method:
                    number: '4111111111111111'
                    expiration_date: 11/2025
                    security_code: '123'
                    store: true
              Authorize PayPal:
                value:
                  amount: 1299
                  currency: USD
                  payment_method_type: paypal
              Authorize BitCoin:
                value:
                  amount: 0.00399
                  currency: USD
                  payment_method_type: bitcoin
        description: ''
      parameters: []
    get:
      summary: List all authorizations
      operationId: get-transactions-authorizations
      parameters:
        - schema:
            type: integer
            default: 100
            example: 1000
            minimum: 0
            maximum: 1000
            format: int32
          in: query
          name: limit
          description: The maximum number of items to return
        - schema:
            type: string
            format: ''
            example: '1593343179'
          in: query
          name: marker
          description: |-
            The marker that identifies the page of results to return.

            For the first page of results, simply omit this parameter. For next pages, simply use the value returned by the API in the `next_marker` field.
      responses:
        '200':
          description: Returns a list of authorizations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Authorizations'
              examples:
                A list of authorizations:
                  value:
                    items:
                      - type: transactions.authorizations
                        id: 589997b2-0d5f-4717-9138-2ff13d62b3c5
                        status: created
                        amount: 1299
                        currency: USD
                        payment_method:
                          type: card
                          id: fa5dc53e-b070-417b-9355-5dc9b80a69e3
                          authorization_url: null
                        provider_statuses:
                          - id: stripe
                            status: created
                            error_code: null
                            error_message: null
                    limit: 100
                    next_page: 5159a2ee-f8f9-4669-99e7-e1dc85f98cb9
                    previous_page: null
        '401':
          description: Returns an error if no valid authentication was provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                An unauthorized request:
                  value:
                    type: error
                    code: unauthorized
                    status: 401
                    message: No valid authentication found
                    documentation_url: 'https://developer.gr4vy.com/errors/unauthorized'
                    additional_context: null
      description: Returns a list of authorizations.
      tags:
        - Authorizations
  '/transactions/authorizations/{authorization_id}':
    parameters:
      - schema:
          type: string
          format: uuid
          example: 8724fd24-5489-4a5d-90fd-0604df7d3b83
        name: authorization_id
        in: path
        required: true
        description: ''
    get:
      summary: Get an authorization
      tags:
        - Authorizations
      responses:
        '200':
          description: Returns a created authorization object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Authorization'
              examples:
                An approved transaction:
                  value:
                    type: transactions.authorizations
                    id: 589997b2-0d5f-4717-9138-2ff13d62b3c5
                    status: created
                    amount: 1299
                    currency: USD
                    payment_method:
                      type: card
                      id: fa5dc53e-b070-417b-9355-5dc9b80a69e3
                      authorization_url: null
                    provider_statuses:
                      - id: stripe
                        status: created
                        error_code: null
                        error_message: null
        '401':
          description: Returns an error if no valid authentication was provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                An unauthorized request:
                  value:
                    type: error
                    code: unauthorized
                    status: 401
                    message: No valid authentication found
                    documentation_url: 'https://developer.gr4vy.com/errors/unauthorized'
                    additional_context: null
        '404':
          description: Returns an error if the authorization can not be found or has not yet been created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Authorization not found:
                  value:
                    type: error
                    code: not_found
                    status: 404
                    message: The resource could not be found
                    documentation_url: 'https://developer.gr4vy.com/errors/not-found'
                    additional_context: null
                Authorization pending:
                  value:
                    type: error
                    code: status_pending
                    status: 404
                    message: The resource is still pending
                    documentation_url: 'https://developer.gr4vy.com/errors/status-pending'
                    additional_context:
                      type: status
                      status: pending
                      resource_type: transactions.authorization
                      resource_id: 8724fd24-5489-4a5d-90fd-0604df7d3b83
      operationId: get-authorizations-id
      description: 'Get an authorization. '
      parameters: []
  /cards:
    get:
      summary: List all cards
      operationId: get-cards
      parameters:
        - schema:
            type: integer
            default: 100
            example: 1000
            minimum: 0
            maximum: 1000
            format: int32
          in: query
          name: limit
          description: The maximum number of items to return
        - schema:
            type: string
            format: ''
            example: '1593343179'
          in: query
          name: marker
          description: |-
            The marker that identifies the page of results to return.

            For the first page of results, simply omit this parameter. For next pages, simply use the value returned by the API in the `next_marker` field.
      responses:
        '200':
          description: Returns a list of cards
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cards'
              examples:
                A list of cards:
                  value:
                    items:
                      - type: card
                        id: 87c5de1b-19af-4196-8acf-d31f23c59484
                        status: partially_created
                        created_at: '2013-07-16T19:23'
                        external_identifier: user-789123
                        provider_statuses:
                          - id: stripe
                            status: created
                            error_code: null
                            error_message: null
                          - id: adyen
                            status: error
                            error_code: invalid_cvv
                            error_message: CVV could not be validated
                    limit: 100
                    next_page: '1593343179'
                    previous_page: null
        '401':
          description: Returns an error if no valid authentication was provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                An unauthorized request:
                  value:
                    type: error
                    code: unauthorized
                    status: 401
                    message: No valid authentication found
                    documentation_url: 'https://developer.gr4vy.com/errors/unauthorized'
                    additional_context: null
      description: Returns a list of cards
      tags:
        - Cards
    post:
      summary: Register a card
      tags:
        - Cards
      responses:
        '202':
          description: 'This API returns asynchronously, returning status object with the ID of the pending `Card` resource.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
              examples:
                Request accepted:
                  value:
                    type: status
                    status: pending
                    resource_type: card
                    resource_id: 42b46d24-8cec-4699-8b84-aca31283367c
        '400':
          description: 'Returns an error if the request is missing any required fields, or the request body is not valid JSON.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Incorrect JSON:
                  value:
                    type: error
                    code: incorrect_json
                    status: 400
                    message: The request body was not valid JSON.
                    documentation_url: 'https://developer.gr4vy.com/errors/incorrect-json'
                    additional_context: null
        '401':
          description: Returns an error if no valid authentication was provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                An unauthorized request:
                  value:
                    type: error
                    code: unauthorized
                    status: 401
                    message: No valid API authentication found
                    documentation_url: 'https://developer.gr4vy.com/errors/unauthorized'
                    additional_context: null
      operationId: post-cards
      description: |-
        Registers a card with all available processors.

        This API returns asynchronously, returning a pending `Status` object with the ID of the pending card resource.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Card-Create'
            examples:
              Tokenize a card:
                value:
                  number: '4111111111111111'
                  expiration_date: 11/2025
                  security_code: '123'
                  external_identifier: user-789123
  '/cards/{card_id}':
    parameters:
      - schema:
          type: string
          format: uuid
          example: 8724fd24-5489-4a5d-90fd-0604df7d3b83
        name: card_id
        in: path
        required: true
        description: The ID for the card to get the information for.
    get:
      summary: Get a card
      tags:
        - Cards
      responses:
        '200':
          description: Returns a created card resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'
              examples:
                A stored card:
                  value:
                    type: card
                    id: 87c5de1b-19af-4196-8acf-d31f23c59484
                    status: partially_created
                    created_at: '2013-07-16T19:23'
                    external_identifier: user-789123
                    provider_statuses:
                      - id: stripe
                        status: created
                        error_code: null
                        error_message: null
                      - id: adyen
                        status: error
                        error_code: invalid_cvv
                        error_message: CVV could not be validated
        '401':
          description: Returns an error if no valid authentication was provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                An unauthorized request:
                  value:
                    type: error
                    code: unauthorized
                    status: 401
                    message: No valid authentication found
                    documentation_url: 'https://developer.gr4vy.com/errors/unauthorized'
                    additional_context: null
        '404':
          description: Returns an error if the authorization can not be found or has not yet been created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Card not found:
                  value:
                    type: error
                    code: not_found
                    status: 404
                    message: The resource could not be found
                    documentation_url: 'https://developer.gr4vy.com/errors/not-found'
                    additional_context: null
                Card creation pending:
                  value:
                    type: error
                    code: status_pending
                    status: 404
                    message: The resource is still pending
                    documentation_url: 'https://developer.gr4vy.com/errors/status-pending'
                    additional_context:
                      type: status
                      status: pending
                      resource_type: card
                      resource_id: 8724fd24-5489-4a5d-90fd-0604df7d3b83
      operationId: get-cards-id
      description: 'Get an authorization. '
      parameters: []
  /transactions/capture:
    post:
      summary: Capture an authorization
      tags:
        - Authorizations
      responses:
        '202':
          description: 'This API returns asynchronously, returning status object with the ID of the pending `Transaction` resource.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
              examples:
                Request accepted:
                  value:
                    type: status
                    status: pending
                    resource_type: transaction
                    resource_id: 8724fd24-5489-4a5d-90fd-0604df7d3b83
        '400':
          description: 'Returns an error if the request is missing any required fields, or the request body is not valid JSON.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Incorrect JSON:
                  value:
                    type: error
                    code: incorrect_json
                    status: 400
                    message: The request body was not valid JSON.
                    documentation_url: 'https://developer.gr4vy.com/errors/incorrect-json'
                    additional_context: null
        '401':
          description: Returns an error if no valid authentication was provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                An unauthorized request:
                  value:
                    type: error
                    code: unauthorized
                    status: 401
                    message: No valid API authentication found
                    documentation_url: 'https://developer.gr4vy.com/errors/unauthorized'
                    additional_context: null
      operationId: post-transactions-capture
      description: Captures a previously authorized transaction.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Capture-Create'
            examples:
              Capture an authorization:
                value:
                  authorization_id: 931b9b0c-dc95-4d45-b1fc-64966244ef74
                  amount: 1299
                  currency: USD
          application/xml:
            schema:
              type: object
              properties: {}
  /transactions:
    get:
      summary: List all transactions
      tags:
        - Transactions
      responses:
        '200':
          description: Returns a paginated list of transactions for an account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transactions'
              examples:
                A list of transactions:
                  value:
                    items:
                      - type: transaction
                        id: 18d41625-16d5-40a8-bc92-16f5e1158e55
                        status: created
                        tansaction_status: pending
                        amount: 1299
                        currency: USD
                        payment_method:
                          type: card
                          id: fa5dc53e-b070-417b-9355-5dc9b80a69e3
                          authorization_url: null
                        provider_statuses:
                          - id: stripe
                            status: pending
                            error_code: null
                            error_message: null
                    limit: 100
                    next_page: '1593343179'
                    previous_page: null
                An empty list of transactions:
                  value:
                    items: []
                    limit: 100
                    next_page: null
                    previous_page: null
        '401':
          description: Returns an error if no valid authentication was provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                An unauthorized request:
                  value:
                    type: error
                    code: unauthorized
                    status: 401
                    message: No valid authentication found
                    documentation_url: 'https://developer.gr4vy.com/errors/unauthorized'
                    additional_context: null
      operationId: get-transactions
      description: Lists all transactions for an account.
      parameters:
        - schema:
            type: integer
            default: 100
            example: 1000
            minimum: 0
            maximum: 1000
            format: int32
          in: query
          name: limit
          description: The maximum number of items to return
        - schema:
            type: string
            example: '1593343179'
          in: query
          name: marker
          description: |-
            The marker that identifies the offsett for the page of results to return.

            For the first page of results, simply omit this parameter. For next pages, simply use the value returned by the API in the `next_marker` field.

            A marker is an opague string that is only meaningful to ur API. No additional value can be ascribed to this value.
    parameters: []
  '/transactions/{transaction_id}':
    parameters:
      - schema:
          type: string
        name: transaction_id
        in: path
        required: true
        description: The ID for the transaction to get the information for.
    get:
      summary: Get a transaction
      tags:
        - Transactions
      responses:
        '200':
          description: Returns a transaction resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
              examples:
                A card transaction:
                  value:
                    type: transaction
                    id: 18d41625-16d5-40a8-bc92-16f5e1158e55
                    status: created
                    tansaction_status: pending
                    amount: 1299
                    currency: USD
                    payment_method:
                      type: card
                      id: fa5dc53e-b070-417b-9355-5dc9b80a69e3
                      authorization_url: null
                    provider_statuses:
                      - id: stripe
                        status: pending
                        error_code: null
                        error_message: null
                A PayPal transaction:
                  value:
                    type: transaction
                    id: 18d41625-16d5-40a8-bc92-16f5e1158e55
                    status: created
                    tansaction_status: pending
                    amount: 1299
                    currency: USD
                    payment_method:
                      type: paypal
                      id: null
                      authorization_url: null
                    provider_statuses:
                      - id: paypal
                        status: pending
                        error_code: null
                        error_message: null
                A BitCoin transaction:
                  value:
                    type: transaction
                    id: 18d41625-16d5-40a8-bc92-16f5e1158e55
                    status: created
                    tansaction_status: pending
                    amount: 0.039999
                    currency: USD
                    payment_method:
                      type: bitcoin
                      id: null
                      authorization_url: null
                    provider_statuses:
                      - id: paypal
                        status: pending
                        error_code: null
                        error_message: null
        '401':
          description: Returns an error if no valid authentication was provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                An unauthorized request:
                  value:
                    type: error
                    code: unauthorized
                    status: 401
                    message: No valid authentication found
                    documentation_url: 'https://developer.gr4vy.com/errors/unauthorized'
                    additional_context: null
        '404':
          description: Returns an error if the transaction can not be found or has not yet been created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Transaction not found:
                  value:
                    type: error
                    code: not_found
                    status: 404
                    message: The resource could not be found
                    documentation_url: 'https://developer.gr4vy.com/errors/not-found'
                    additional_context: null
                Transaction pending:
                  value:
                    type: error
                    code: status_pending
                    status: 404
                    message: The resource is still pending
                    documentation_url: 'https://developer.gr4vy.com/errors/status-pending'
                    additional_context:
                      type: status
                      status: pending
                      resource_type: transaction
                      resource_id: 8724fd24-5489-4a5d-90fd-0604df7d3b83
      operationId: get-transaction-id
      description: 'Get a transaction. '
      parameters: []
  /transactions/batch-capture:
    post:
      summary: Batch capture authorizations
      responses:
        '202':
          description: 'Returns a list of status objects, one for each requested capture.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Statuses'
              examples:
                A list of accepted capture requests:
                  value:
                    items:
                      - type: status
                        status: pending
                        resource_type: transaction
                        resource_id: 8724fd24-5489-4a5d-90fd-0604df7d3b83
                      - type: status
                        status: pending
                        resource_type: transaction
                        resource_id: 8724fd24-5489-4a5d-90fd-0604df7d3b83
                      - type: status
                        status: pending
                        resource_type: transaction
                        resource_id: 8724fd24-5489-4a5d-90fd-0604df7d3b83
                    limit: 100
                    next_page: null
                    previous_page: null
        '400':
          description: 'Returns an error if the request is missing any required fields, or the request body is not valid JSON/CSV.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Incorrect JSON:
                  value:
                    type: error
                    code: incorrect_json
                    status: 400
                    message: The request body was not valid JSON.
                    documentation_url: 'https://developer.gr4vy.com/errors/incorrect-json'
                    additional_context: null
                Incorrect CSV:
                  value:
                    type: error
                    code: incorrect_csv
                    status: 400
                    message: The request body was not valid CSV.
                    documentation_url: 'https://developer.gr4vy.com/errors/incorrect-csv'
                    additional_context: null
        '401':
          description: Returns an error if no valid authentication was provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                An unauthorized request:
                  value:
                    type: error
                    code: unauthorized
                    status: 401
                    message: No valid API authentication found
                    documentation_url: 'https://developer.gr4vy.com/errors/unauthorized'
                    additional_context: null
        '403':
          description: Forbidden
      operationId: post-transactions-batch-capture
      description: Takes a JSON or CSV list of authorization IDs and processes them as needed.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/Capture-Create'
            examples:
              Capture multiple authorizations:
                value:
                  items:
                    - authorization_id: 931b9b0c-dc95-4d45-b1fc-64966244ef74
                      amount: 1299
                      currency: USD
                    - authorization_id: 272dee2b-2196-4e4e-acf7-e5983f1fdc61
                      amount: 199
                      currency: GBP
                    - authorization_id: d3c096cd-33ad-4235-bba9-f2eb0ccb307d
                      amount: 0.0003999
                      currency: BTC
        description: |
          The body of this API takes either a list of items as a JSON object, or a CSV file with each line representing an authorization request, and the headers representing the fields to process.
      tags:
        - Transactions
components:
  schemas:
    Status:
      title: Status
      type: object
      description: 'In many cases the Gr4vy API returns asynchronously, kicking off a job to create an authorization or a transaction, and returning a `Status` object with the ID of the pending object. The ID of this resource can be used to query an objects status, or additionally the client can use Pub/Sub to subscribe to the creation of the pending object.'
      x-examples:
        A pending authorization:
          type: status
          status: pending
          resource_type: transactions.authorization
          resource_id: 8724fd24-5489-4a5d-90fd-0604df7d3b83
      properties:
        type:
          type: string
          description: The type of this object. This is always `status`.
          enum:
            - status
          example: status
        status:
          type: string
          enum:
            - pending
            - success
            - failure
          example: pending
          description: |-
            The status of this resource being created. This can be one of:

            * `pending` - The creation has not yet completed
            * `created` - The resource has been created and can now be queried.
        resource_type:
          type: string
          description: |
            The type of the object that is pending.
