        amount:
          description: |-
            The monitary amount to create an authorization for, in the smallest currency unit for the given currency, for example `1299` cents to create an autorization for `$12.99`.

            For BitCoin, this value will be a decimal point number, for example `0.0039`.
          oneOf:
            - type: number
              format: double
            - type: integer
              format: int64
        currency:
          type: string
          example: USD
          description: A supported ISO-4217 currency code.
        payment_method_type:
          type: string
          description: The type of payment method to create an authorization for.
          enum:
            - card
            - paypal
            - bitcoin
          example: card
        payment_method:
          oneOf:
            - allOf:
                - $ref: '#/components/schemas/Card-Create'
