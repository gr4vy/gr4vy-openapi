      title: Authorization (Create)
      type: object
      description: A request to create an authorization
      x-examples:
        'Authorize, store, and capture a card':
          amount: 1299
          currency: USD
          payment_method_type: card
          capture: true
          payment_method:
            number: '4111111111111111'
            expiration_date: 11/2025
            security_code: '123'
            store: true
        Create a PayPal authorization:
          amount: 1299
