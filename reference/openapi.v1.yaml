openapi: 3.0.0
info:
  title: Gr4vy API
  version: '1.0'
  contact:
    name: Gr4vy Support
    email: support@gr4vy.com
    url: 'https://gr4vy.com'
  termsOfService: 'https://gr4vy.com'
  license:
    name: MIT
  description: The Gr4vy API
servers:
  - url: 'https://{cluster}'
    variables:
      cluster:
        default: api.gr4vy.com
        description: "The custom domain for the customer's cluster."
tags:
  - name: Authorizations
  - name: Cards
paths:
  /transactions/authorizations:
    post:
      summary: Create an authorization
      tags:
        - Authorizations
      responses:
        '202':
          description: 'This API returns asynchronously, returning status object with the ID of the pending `Authorization` resource.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
              examples:
                Request accepted:
                  value:
                    type: status
                    status: pending
                    resource_type: transactions.authorization
                    resource_id: 8724fd24-5489-4a5d-90fd-0604df7d3b83
        '400':
          description: 'Returns an error if the request is missing any required fields, or the request body is not valid JSON.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Incorrect JSON:
                  value:
                    type: error
                    code: incorrect_json
                    status: 400
                    message: The request body was not valid JSON.
                    documentation_url: 'https://developer.gr4vy.com/errors/incorrect-json'
                    additional_context: null
        '401':
          description: Returns an error if no valid authentication was provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                An unauthorized request:
                  value:
                    type: error
                    code: unauthorized
                    status: 401
                    message: No valid API authentication found
                    documentation_url: 'https://developer.gr4vy.com/errors/unauthorized'
                    additional_context: null
      operationId: post-transactions-authorizations
      description: |-
        Creates an authorization on a card.

        This API can perform a few additional actions at the same time as creating the authorization.

        * `card.store` - Use this method to store the card for furture use
        * `capture` - Use this method to also perform a capture on the card after it has been authorized.

        This API returns asynchronously, returning a pending `Status` object with the ID of the pending authorization.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: integer
                  format: int64
                  minimum: 50
                  exclusiveMinimum: false
                  maximum: 99999999
                  example: 1299
                  description: 'The monitary amount to create an authorization for, in the smallest currency unit for the given currency, for example `1299` cents to create an autorization for `$12.99`.'
                currency:
                  type: string
                  example: USD
                  description: A supported ISO-4217 currency code.
                card:
                  type: object
                  required:
                    - number
                  properties:
                    number:
                      type: string
                      minLength: 14
                      maxLength: 16
                      example: '4111111111111111'
                      pattern: '^[0-9]{14,16}$'
                      description: |-
                        The 15-16 digit number for this credit card as it can be found on the front of the card.

                        If a card has been stored with us previously, this number will represent the unique tokenized card ID provided via our API.
                    expiration_date:
                      type: string
                      description: 'The expiration date of the card, formatted `MM/YYYY`. If a card has been previously stored with us this value is optional.'
                      example: 11/2015
                      pattern: "^\\d\\d/\\d\\d\\d\\d$"
                      minLength: 7
                      maxLength: 7
                    security_code:
                      type: string
                      description: |-
                        The 3 or 4 digit security code often found on the card. This often referred to as the CVV or CVD.

                        If a card has been previously stored with us this value is optional.
                      pattern: "^\\d{3,4}$"
                      minLength: 3
                      maxLength: 4
                      example: '123'
                    store:
                      type: boolean
                      description: Wether to also store the card and have it tokenized against your registered processors.
                      example: true
                capture:
                  type: boolean
                  description: 'Wether a successful authorization should immediately be captured as well, effectively processing the payment directly.'
                  default: 'false'
                  example: true
              required:
                - amount
                - currency
                - card
            examples:
              Authorize a new card:
                value:
                  amount: '1299'
                  currency: USD
                  card:
                    number: '4111111111111111'
                    expiration_date: 11/2025
                    security_code: '123'
              Authorize a tokenized card:
                value:
                  amount: '1299'
                  currency: USD
                  card:
                    number: '01231231231231'
              Authorized and tokenize a card:
                value:
                  amount: '1299'
                  currency: USD
                  card:
                    number: '4111111111111111'
                    expiration_date: 11/2025
                    security_code: '123'
                    store: true
              'Authorize, capture, and tokenize a card':
                value:
                  amount: '1299'
                  currency: USD
                  card:
                    number: '4111111111111111'
                    expiration_date: 11/2025
                    security_code: '123'
                    store: true
                  capture: true
        description: ''
      parameters: []
    get:
      summary: List all authorizations
      operationId: get-transactions-authorizations
      responses:
        '200':
          description: Returns a list of authorizations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Authorizations'
              examples:
                A list of authorizations:
                  value:
                    items:
                      - type: transactions.authorizations
                        id: 589997b2-0d5f-4717-9138-2ff13d62b3c5
                        status: created
                        amount: 1299
                        card:
                          type: card
                          id: fa5dc53e-b070-417b-9355-5dc9b80a69e3
                    limit: 100
                    next_page: 5159a2ee-f8f9-4669-99e7-e1dc85f98cb9
                    previous_page: null
        '401':
          description: Returns an error if no valid authentication was provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                An unauthorized request:
                  value:
                    type: error
                    code: unauthorized
                    status: 401
                    message: No valid authentication found
                    documentation_url: 'https://developer.gr4vy.com/errors/unauthorized'
                    additional_context: null
      description: Returns a list of authorizations.
      tags:
        - Authorizations
  '/transactions/authorizations/{authorization_id}':
    parameters:
      - schema:
          type: string
          format: uuid
          example: 8724fd24-5489-4a5d-90fd-0604df7d3b83
        name: authorization_id
        in: path
        required: true
        description: ''
    get:
      summary: Get an authorization
      tags:
        - Authorizations
      responses:
        '200':
          description: Returns a created authorization object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Authorization'
              examples:
                An approved transaction:
                  value:
                    type: transactions.authorizations
                    id: 589997b2-0d5f-4717-9138-2ff13d62b3c5
                    status: created
                    amount: 1299
                    card:
                      type: card
                      id: fa5dc53e-b070-417b-9355-5dc9b80a69e3
        '401':
          description: Returns an error if no valid authentication was provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                An unauthorized request:
                  value:
                    type: error
                    code: unauthorized
                    status: 401
                    message: No valid authentication found
                    documentation_url: 'https://developer.gr4vy.com/errors/unauthorized'
                    additional_context: null
        '404':
          description: Returns an error if the authorization can not be found or has not yet been created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Authorization not found:
                  value:
                    type: error
                    code: not_found
                    status: 404
                    message: The resource could not be found
                    documentation_url: 'https://developer.gr4vy.com/errors/not-found'
                    additional_context: null
                Authorization pending:
                  value:
                    type: error
                    code: status_pending
                    status: 404
                    message: The resource is still pending
                    documentation_url: 'https://developer.gr4vy.com/errors/status-pending'
                    additional_context:
                      type: status
                      status: pending
                      resource_type: transactions.authorization
                      resource_id: 8724fd24-5489-4a5d-90fd-0604df7d3b83
      operationId: get-authorizations-id
      description: 'Get an authorization. '
      parameters: []
  /cards:
    get:
      summary: List all cards
      operationId: get-cards
      responses:
        '200':
          description: Returns a list of cards
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cards'
              examples:
                A list of cards:
                  value:
                    items:
                      - type: card
                        id: 589997b2-0d5f-4717-9138-2ff13d62b3c5
                        status: created
                    limit: 100
                    next_page: 5159a2ee-f8f9-4669-99e7-e1dc85f98cb9
                    previous_page: null
        '401':
          description: Returns an error if no valid authentication was provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                An unauthorized request:
                  value:
                    type: error
                    code: unauthorized
                    status: 401
                    message: No valid authentication found
                    documentation_url: 'https://developer.gr4vy.com/errors/unauthorized'
                    additional_context: null
      description: Returns a list of cards
      tags:
        - Authorizations
    post:
      summary: Register a card
      tags:
        - Cards
      responses:
        '202':
          description: 'This API returns asynchronously, returning status object with the ID of the pending `Card` resource.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
              examples:
                Request accepted:
                  value:
                    type: status
                    status: pending
                    resource_type: card
                    resource_id: 42b46d24-8cec-4699-8b84-aca31283367c
        '400':
          description: 'Returns an error if the request is missing any required fields, or the request body is not valid JSON.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Incorrect JSON:
                  value:
                    type: error
                    code: incorrect_json
                    status: 400
                    message: The request body was not valid JSON.
                    documentation_url: 'https://developer.gr4vy.com/errors/incorrect-json'
                    additional_context: null
        '401':
          description: Returns an error if no valid authentication was provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                An unauthorized request:
                  value:
                    type: error
                    code: unauthorized
                    status: 401
                    message: No valid API authentication found
                    documentation_url: 'https://developer.gr4vy.com/errors/unauthorized'
                    additional_context: null
      operationId: post-cards
      description: |-
        Registers a card with all available processors.

        This API returns asynchronously, returning a pending `Status` object with the ID of the pending card resource.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                number:
                  type: string
                  minLength: 14
                  maxLength: 16
                  example: '4111111111111111'
                  pattern: '^[0-9]{14,16}$'
                  description: |-
                    The 15-16 digit number for this credit card as it can be found on the front of the card.

                    If a card has been stored with us previously, this number will represent the unique tokenized card ID provided via our API.
                expiration_date:
                  type: string
                  description: 'The expiration date of the card, formatted `MM/YYYY`. If a card has been previously stored with us this value is optional.'
                  example: 11/2015
                  pattern: "^\\d\\d/\\d\\d\\d\\d$"
                  minLength: 7
                  maxLength: 7
                security_code:
                  type: string
                  description: |-
                    The 3 or 4 digit security code often found on the card. This often referred to as the CVV or CVD.

                    If a card has been previously stored with us this value is optional.
                  pattern: "^\\d{3,4}$"
                  minLength: 3
                  maxLength: 4
                  example: '123'
            examples:
              Tokenize a card:
                value:
                  number: '4111111111111111'
                  expiration_date: 11/2025
                  security_code: '123'
  '/cards/{card_id}':
    parameters:
      - schema:
          type: string
          format: uuid
          example: 8724fd24-5489-4a5d-90fd-0604df7d3b83
        name: card_id
        in: path
        required: true
        description: The ID for the card to get the information for.
    get:
      summary: Get a card
      tags:
        - Cards
      responses:
        '200':
          description: Returns a created card resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'
              examples:
                An approved transaction:
                  value:
                    type: card
                    id: 6bbc3b97-4183-4145-839e-0f3624c9b7ce
                    status: created
        '401':
          description: Returns an error if no valid authentication was provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                An unauthorized request:
                  value:
                    type: error
                    code: unauthorized
                    status: 401
                    message: No valid authentication found
                    documentation_url: 'https://developer.gr4vy.com/errors/unauthorized'
                    additional_context: null
        '404':
          description: Returns an error if the authorization can not be found or has not yet been created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Authorization not found:
                  value:
                    type: error
                    code: not_found
                    status: 404
                    message: The resource could not be found
                    documentation_url: 'https://developer.gr4vy.com/errors/not-found'
                    additional_context: null
                Authorization pending:
                  value:
                    type: error
                    code: status_pending
                    status: 404
                    message: The resource is still pending
                    documentation_url: 'https://developer.gr4vy.com/errors/status-pending'
                    additional_context:
                      type: status
                      status: pending
                      resource_type: transactions.authorization
                      resource_id: 8724fd24-5489-4a5d-90fd-0604df7d3b83
      operationId: get-cards-id
      description: 'Get an authorization. '
      parameters: []
  /transactions/capture:
    post:
      summary: Capture an authorization
      tags:
        - Authorizations
      responses:
        '202':
          description: 'This API returns asynchronously, returning status object with the ID of the pending `Transaction` resource.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
              examples:
                Request accepted:
                  value:
                    type: status
                    status: pending
                    resource_type: transaction
                    resource_id: 8724fd24-5489-4a5d-90fd-0604df7d3b83
        '400':
          description: 'Returns an error if the request is missing any required fields, or the request body is not valid JSON.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Incorrect JSON:
                  value:
                    type: error
                    code: incorrect_json
                    status: 400
                    message: The request body was not valid JSON.
                    documentation_url: 'https://developer.gr4vy.com/errors/incorrect-json'
                    additional_context: null
        '401':
          description: Returns an error if no valid authentication was provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                An unauthorized request:
                  value:
                    type: error
                    code: unauthorized
                    status: 401
                    message: No valid API authentication found
                    documentation_url: 'https://developer.gr4vy.com/errors/unauthorized'
                    additional_context: null
      operationId: post-transactions-capture
      description: Captures a previously authorized transaction.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                authorization_id:
                  type: string
                  description: The ID of the authorization to capture
                  format: uuid
                  example: 3d1748e5-16fa-468c-82ca-05f31252f515
                partial_amount:
                  type: integer
                  description: |-
                    The (partial) amount to capture.

                    When left blank, this will capture the entire amount.
                  minimum: 50
                  maximum: 99999999
                  format: int64
                close:
                  type:
                    - string
                    - boolean
                  description: 'Wether to close this authorization on capture, even if only a partial amount was captured.'
              required:
                - authorization_id
components:
  schemas:
    Status:
      title: Status
      type: object
      description: 'In many cases the Gr4vy API returns asynchronously, kicking off a job to create an authorization or a transaction, and returning a `Status` object with the ID of the pending object. The ID of this resource can be used to query an objects status, or additionally the client can use Pub/Sub to subscribe to the creation of the pending object.'
      x-examples:
        A pending authorization:
          type: status
          status: pending
          resource_type: transactions.authorization
          resource_id: 8724fd24-5489-4a5d-90fd-0604df7d3b83
      properties:
        type:
          type: string
          description: The type of this object. This is always `status`.
          enum:
            - status
          example: status
        status:
          type: string
          enum:
            - pending
            - success
            - failure
          example: pending
          description: |-
            The status of this resource being created. This can be one of:

            * `pending` - The creation has not yet completed
            * `created` - The resource has been created and can now be queried.
        resource_type:
          type: string
          description: |
            The type of the object that is pending.
          example: transactions.authorization
          enum:
            - transactions.authorization
            - card
        resource_id:
          type: string
          format: uuid
          example: 8724fd24-5489-4a5d-90fd-0604df7d3b83
          description: The ID of the object for which this status has been created.
      required:
        - type
        - status
        - resource_type
        - resource_id
    Error:
      title: Error
      type: object
      description: A generic client error.
      x-examples:
        Incorrect JSON:
          type: error
          code: incorrect_json
          status: 400
          message: The request body was not valid JSON.
          documentation_url: 'https://developer.gr4vy.com/errors/incorrect-json'
          additional_context: null
      properties:
        type:
          type: string
          description: The typeof this object. This is always `error`.
          enum:
            - error
          example: error
          default: error
        code:
          type: string
          description: A custom code to further describe the type of error being returned. This code provides further specification within the HTTP `status` code and can be used by a program to define logic based on the error.
          enum:
            - incorrect_json
            - bad_request
            - unauthorized
            - not_found
          example: incorrect_json
        status:
          type: integer
          description: The HTTP status code of this error
          format: int32
          default: 0
          minimum: 200
          exclusiveMaximum: true
          maximum: 600
          example: 499
        message:
          type: string
          description: 'A human readable message that describes the error. The content of this field should not be used to determine any business logic. '
          example: The request body was not valid JSON.
        documentation_url:
          type: string
          description: A link to the developer documentation for this error.
          format: uri
          example: 'https://developer.gr4vy.com/errors/incorrect-json'
        additional_context:
          anyOf:
            - $ref: '#/components/schemas/Status'
          description: An optional status object that might be returned to showcase why an API can not return a resource (yet).
      required:
        - type
        - code
        - status
        - message
        - documentation_url
    Authorization:
      title: Authorization
      type: object
      x-tags:
        - Authorizations
      description: Represents an authorization for a card. The authorization might have been approved or not.
      x-examples:
        An approved authorization:
          type: transactions.authorizations
          id: 589997b2-0d5f-4717-9138-2ff13d62b3c5
          status: created
          amount: 1299
          card:
            type: card
            id: fa5dc53e-b070-417b-9355-5dc9b80a69e3
        An declined authorization:
          type: transactions.authorizations
          id: 589997b2-0d5f-4717-9138-2ff13d62b3c5
          status: declined
          amount: null
      properties:
        type:
          type: string
          description: The type of this resource. Is always `transactions.authorization`
          example: transactions.authorization
          enum:
            - transactions.authorization
        id:
          type: string
          description: The unique ID of this authorization.
          format: uuid
          example: 8724fd24-5489-4a5d-90fd-0604df7d3b83
        status:
          type: string
          description: Wether this authorization was successfully created or not.
          example: created
          enum:
            - created
            - declined
            - closed
        amount:
          type: integer
          description: 'The monitary amount this authorization is for, in the smallest currency unit for the given currency, for example `1299` cents for `$12.99`.'
          format: int64
          example: 1299
          minimum: 50
          maximum: 99999999
        currency:
          type: string
          description: A supported ISO-4217 currency code.
          example: USD
        card:
          $ref: '#/components/schemas/Card'
      required:
        - type
        - id
        - status
        - card
    Authorizations:
      title: Authorizations
      x-tags:
        - Authorizations
      description: A list of authorizations
      type: object
      properties:
        items:
          type: array
          description: A list of authorizations
          items:
            $ref: '#/components/schemas/Authorization'
        limit:
          type: integer
          description: 'The limit set to the number of items returned. '
          format: int32
          minimum: 0
          maximum: 1000
          example: 100
          default: 100
        next_marker:
          type: string
          description: The marker that represents the next page of results.
          format: uuid
          example: 9f944c64-eaf0-4219-90fd-f7e56c7cd214
        previous_marker:
          type: string
          description: The marker that represents the previ page of results.
          format: uuid
          example: 9049b2f9-0c67-47c5-af18-e8525f855263
      required:
        - items
        - limit
        - next_marker
        - previous_marker
      x-examples:
        A list of authorizations:
          items:
            - type: transactions.authorizations
              id: 589997b2-0d5f-4717-9138-2ff13d62b3c5
              approved: true
              amount: 1299
              card:
                type: card
                id: fa5dc53e-b070-417b-9355-5dc9b80a69e3
              status: created
          limit: 100
          next_page: 5159a2ee-f8f9-4669-99e7-e1dc85f98cb9
          previous_page: null
        An empty list of authorizations:
          items: []
          limit: 100
          next_page: null
          previous_page: null
    Card:
      title: Card
      type: object
      x-tags:
        - Cards
      properties:
        type:
          type: string
          description: The type of this resource. Is always `card`
        id:
          type: string
          example: fe26475d-ec3e-4884-9553-f7356683f7f9
          description: 'If a card has been stored with us previously, this number will represent the unique tokenized card ID provided via our API.'
        status:
          type: string
          description: Wether this authorization was successfully created or not.
          enum:
            - created
          example: created
    Cards:
      title: Cards
      x-tags:
        - Cards
      description: A list of cards
      type: object
      properties:
        items:
          type: array
          description: A list of authorizations
          items:
            $ref: '#/components/schemas/Card'
        limit:
          type: integer
          description: 'The limit set to the number of items returned. '
          format: int32
          minimum: 0
          maximum: 1000
          example: 100
          default: 100
        next_marker:
          type: string
          description: The marker that represents the next page of results.
          format: uuid
          example: 9f944c64-eaf0-4219-90fd-f7e56c7cd214
        previous_marker:
          type: string
          description: The marker that represents the previ page of results.
          format: uuid
          example: 9049b2f9-0c67-47c5-af18-e8525f855263
      required:
        - items
        - limit
        - next_marker
        - previous_marker
      x-examples:
        A list of cards:
          items:
            - type: card
              id: 589997b2-0d5f-4717-9138-2ff13d62b3c5
          limit: 100
          next_page: 5159a2ee-f8f9-4669-99e7-e1dc85f98cb9
          previous_page: null
        An empty list of cards:
          items: []
          limit: 100
          next_page: null
          previous_page: null
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: ''
security:
  - BearerAuth: []
