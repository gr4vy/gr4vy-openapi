  "/payment-services/{payment_service_id}":
    parameters:
      - $ref: "./path-parameters/payment_service_id.yaml"
    get:
      $ref: "./paths/payment_services__get-payment-service.yaml"
    put:
      $ref: "./paths/payment_services__update-payment-service.yaml"
