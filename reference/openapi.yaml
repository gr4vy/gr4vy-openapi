  #   get:
  #     $ref: "./paths/payment_methods__redirect-payment-method-approval.yaml"

  "/payment-options":
    get:
      $ref: "./paths/payment_options__list-payment-options.yaml"

  "/payment-services":
    get:
      $ref: "./paths/payment_services__list-payment-services.yaml"
