---
operationId: create-api-key-pair
summary: Create an API key-pair
description: Creates a new API key-pair
tags:
  - API Key Pairs
x-internal: true

responses:
  "201":
    description: A newly created key pair
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/APIKeyPair"
        examples:
          A newly created API key pair:
            value:
              type: api-key-pair
              id: gg9ILy
              private_key: |-
                -----BEGIN ENCRYPTED PRIVATE KEY-----
                ...
                -----END ENCRYPTED PRIVATE KEY-----
              passphrase: af2675c9aba7de1f3bccb30757d7afd8
              created_at: "2012-12-12T10:53:43-08:00"
              updated_at: "2012-12-12T10:53:43-08:00"

  "401":
    description: Returns an error if no valid authentication was provided.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error401Unauthorized"
