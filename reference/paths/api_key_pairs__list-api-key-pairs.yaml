---
operationId: list-api-key-pairs
summary: List API key-pairs
description: Returns a list of active API key-pairs
tags:
  - API Key Pairs
x-internal: true

parameters:
  - $ref: "../query-parameters/limit-100.yaml"
  - $ref: "../query-parameters/cursor.yaml"

responses:
  "200":
    description: A list of active key pairs
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/APIKeyPairs"
        examples:
          A list of key pairs:
            value:
              items:
                - type: api-key-pair
                  id: gg9ILy
                  private_key: null
                  passphrase: null
                  created_at: "2012-12-12T10:53:43-08:00"
                  updated_at: "2012-12-12T10:53:43-08:00"
                - type: api-key-pair
                  id: d028ec5c-12e4-43d0-b187-c6fe79b3b5dd
                  private_key: null
                  passphrase: null
                  created_at: "2012-12-12T10:53:12-08:00"
                  updated_at: "2012-12-12T10:53:12-08:00"

  "401":
    description: Returns an error if no valid authentication was provided.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error401Unauthorized"
