---
operationId: add-buyer
summary: Add buyer
description: |
  Adds a buyer, allowing for payment methods and transactions to be associated
  to this buyer.
tags:
  - Buyers

requestBody:
  content:
    application/json:
      schema:
        $ref: "../openapi.yaml#/components/schemas/BuyerCreateRequest"
      examples:
        Create a buyer:
          value:
            external_identifier: "412231123"
            display_name: John L.

responses:
  "201":
    description:
      "This API returns asynchronously, returning status object with the ID of
      the pending `Card` resource."
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Card"

  "400":
    description:
      "Returns an error if the request is missing any required fields, or the
      request body is not valid JSON."
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error"
        examples:
          Incorrect JSON:
            value:
              type: error
              code: incorrect_json
              status: 400
              message: The request body was not valid JSON.
              additional_context: null

  "401":
    description: Returns an error if no valid authentication was provided.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error"
        examples:
          An unauthorized request:
            value:
              type: error
              code: unauthorized
              status: 401
              message: No valid API authentication found
              additional_context: null
