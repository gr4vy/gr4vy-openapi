---
operationId: list-buyer-payment-methods
summary: List payment methods for a buyer
description: |-
  Lists the payment methods for a buyer. This endpoint returns all payment
  methods in the `token` format and only returns fully stored and tokenized
  payment methods.
tags:
  - Payment Methods

responses:
  "200":
    description: Returns a list of token-formatted payment methods
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/PaymentMethods--Token"

  "401":
    description: Returns an error if no valid authentication was provided.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error401Unauthorized"

  "404":
    description: Returns an error if the resource can not be found.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error404NotFound"
