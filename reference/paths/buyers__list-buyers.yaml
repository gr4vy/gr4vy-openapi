---
operationId: list-buyers
summary: List buyers
description: Returns a list of cards
tags:
  - Buyers

parameters:
  - $ref: "../parameters/limit-100.yaml"
  - $ref: "../parameters/cursor.yaml"
  - schema:
      type: string
      example: be828248-56de-481e-a580-44b6e1d4df81
    in: query
    name: external_identifier
    description:
      Filters the results to the buyer that matches this external identifier.

responses:
  "200":
    description: Returns a list of buyers
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Buyers"

  "401":
    description: Returns an error if no valid authentication was provided.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error401Unauthorized"
