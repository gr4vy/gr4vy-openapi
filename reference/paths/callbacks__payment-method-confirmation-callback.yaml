---
operationId: payment-method-confirmation-callback
summary: Confirm buyer authorization
description: |-
  Internal API used as a redirect endpoint for payment methods that require
  buyer authorization.

  For example, when a buyer tries to add a PayPal payment method, the buyer
  needs to be sent to PayPal, after which they are sent back to this endpoint
  upon completion.

  This API applies any required updates for the payment method based on its
  query params and then redirects the browser back to the `redirect_url` specified
  when the payment method was first created.
tags:
  - Callbacks
x-internal: true
security: []

responses:
  "302":
    description: |-
      Redirects the browser back to the `redirect_url` specified
      when the payment method was first created. It appends the payment method's
      ID and status.
    headers:
      location:
        description: |-
          The URL to redirect the browser to. This is the `redirect_url` specified
          when the payment method was first created with some additional query
          parameters appended.

          * `payment_method_id` - The ID of the payment method
          * `payment_method_status` - The current value of the
            `payment_method_status`  field of the payment method

        schema:
          type: string
          format: url
          example: |-
            https://example.com/callback?payment_method_id=77a76f7e-d2de-4bbc-ada9-d6a0015e6bd5&payment_method_status=registered

  "404":
    description: Returns an error if the resource can not be found.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error404NotFound"
