---
operationId: list-cards-rules
summary: List card rules
description: Returns a list of rules for card transactions
tags:
  - Card Rules
x-internal: true

parameters:
  - $ref: "../query-parameters/amount.yaml"
  - $ref: "../query-parameters/currency.yaml"
  - $ref: "../query-parameters/scheme.yaml"
  - $ref: "../query-parameters/store.yaml"

responses:
  "200":
    description: |-
      A list of card rules, optionally filtered down to only the ones that would
      resolve for the given query parameters.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/CardRules"

  "401":
    description: Returns an error if no valid authentication was provided.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error401Unauthorized"
