---
operationId: activate-card-ruleset
summary: Activate card ruleset
description: |-
  Activates aa ruleset for card transactions, making it the one
  ruleset used by all card transactions.

  Only one ruleset can be active at any time. By activating a ruleset the
  existing active ruleset will be deactivated.

  Only valid rulesets can be activated.
tags: ["Card Rulesets"]
responses:
  "201":
    description: An activated ruleset
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/CardRuleset"
        examples:
          A newly created ruleset:
            value:
              type: ruleset
              id: 8d3fe99b-1422-42e6-bbb3-932d95ae5f79
              display_name: Q2 2020 Ruleset
              active: true
              valid: true
              root_rule_id: "0"
              created_at: "2012-12-12T10:53:43-08:00"
              updated_at: "2012-12-12T10:53:43-08:00"
              rules:
                - type: card-rule
                  id: "0"
                  rule_type: conditional
                  key: amount
                  condition: ">="
                  value: "200"
                  true_rule_id: "1"
                  false_rule_id: "2"
                - type: card-rule
                  id: "1"
                  rule_type: terminal
                  payment_service_ids:
                    - stripe-card-f47db210-8e30-4f74-8123-b834604f2042
                - type: card-rule
                  id: "2"
                  rule_type: terminal
                  payment_service_ids:
                    - card-braintree-0bb93ab0-86ef-4ad5-addf-b69913128d96

  "403":
    description: Returns an error if the ruleset is not valid
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error"
        examples:
          Invalid JSON:
            value:
              type: error
              code: invalid_ruleset
              status: 403
              message: Ruleset is not valid. Only valid rulesets can be deployed
              additional_context: null

  "404":
    description: Returns an error if the ruleset could not be found
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error"
        examples:
          Ruleset not found:
            value:
              type: error
              code: not_found
              status: 404
              message: The resource could not be found
              additional_context: null
