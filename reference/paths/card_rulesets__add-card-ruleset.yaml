---
operationId: add-card-ruleset
summary: Create card ruleset
description: Creates a new ruleset that can be used for card transactions.
tags: ["Card Rulesets"]

requestBody:
  content:
    application/json:
      schema:
        $ref: "../openapi.yaml#/components/schemas/CardRulesetCreateRequest"
      examples:
        A minimum valid ruleset:
          value:
            display_name: Q2 2020 Ruleset
            root_rule_id: "0"
            rules:
              - type: card-rule
                id: "0"
                rule_type: conditional
                key: amount
                condition: ">="
                value: "200"
                true_rule_id: "1"
                false_rule_id: "2"
              - type: card-rule
                id: "1"
                rule_type: terminal
                payment_service_ids:
                  - stripe-card-f47db210-8e30-4f74-8123-b834604f2042
              - type: card-rule
                id: "2"
                rule_type: terminal
                payment_service_ids:
                  - card-braintree-0bb93ab0-86ef-4ad5-addf-b69913128d96

responses:
  "201":
    description: A newly created ruleset
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/CardRuleset"
        examples:
          A newly created ruleset:
            value:
              type: ruleset
              id: 8d3fe99b-1422-42e6-bbb3-932d95ae5f79
              display_name: Q2 2020 Ruleset
              active: true
              valid: true
              root_rule_id: "0"
              created_at: "2012-12-12T10:53:43-08:00"
              updated_at: "2012-12-12T10:53:43-08:00"
              rules:
                - type: card-rule
                  id: "0"
                  rule_type: conditional
                  key: amount
                  condition: ">="
                  value: "200"
                  true_rule_id: "1"
                  false_rule_id: "2"
                - type: card-rule
                  id: "1"
                  rule_type: terminal
                  payment_service_ids:
                    - stripe-card-f47db210-8e30-4f74-8123-b834604f2042
                - type: card-rule
                  id: "2"
                  rule_type: terminal
                  payment_service_ids:
                    - card-braintree-0bb93ab0-86ef-4ad5-addf-b69913128d96

  "400":
    description: Returns an error if the ruleset is not valid JSON
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error"
        examples:
          Invalid JSON:
            value:
              type: error
              code: invalid_json
              status: 400
              message: Invalid JSON
              additional_context: null
