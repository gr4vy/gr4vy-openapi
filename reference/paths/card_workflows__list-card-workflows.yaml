---
operationId: list-cards-workflows
summary: List card workflows
description: Returns a list of workflows that can be used for card transactions.
tags:
  - Card Workflows
x-internal: true

parameters:
  - $ref: "../query-parameters/limit-100.yaml"
  - $ref: "../query-parameters/cursor.yaml"

responses:
  "200":
    description: A list of workflows
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/CardWorkflows"
        examples:
          A list of card workflows:
            value:
              items:
                - type: workflow
                  id: 8d3fe99b-1422-42e6-bbb3-932d95ae5f79
                  display_name: Q2 2020 Workflow
                  active: true
                  valid: true
                  root_rule_id: "0"
                  created_at: "2012-12-12T10:53:43-08:00"
                  updated_at: "2012-12-12T10:53:43-08:00"
                  rules:
                    - type: card-rule
                      id: "0"
                      rule_type: string-conditional
                      key: currency
                      condition: "IN"
                      values: ["USD", "GBP"]
                      true_rule_id: "1"
                      false_rule_id: "2"
                    - type: card-rule
                      id: "1"
                      rule_type: payment-services-terminal
                      payment_service_ids:
                        - stripe-card-f47db210-8e30-4f74-8123-b834604f2042
                    - type: card-rule
                      id: "2"
                      rule_type: payment-services-terminal
                      payment_service_ids:
                        - card-braintree-0bb93ab0-86ef-4ad5-addf-b69913128d96
          An empty list of card workflows:
            value:
              items: []

  "401":
    description: Returns an error if no valid authentication was provided.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error401Unauthorized"
