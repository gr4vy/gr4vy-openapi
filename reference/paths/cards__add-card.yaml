---
operationId: add-card
summary: Register card
description: |
  Registers a card with all available processors.
tags: ["Cards"]
requestBody:
  content:
    application/json:
      schema:
        $ref: "../openapi.yaml#/components/schemas/CardCreateRequest"
      examples:
        Tokenize a card:
          value:
            number: "4111111111111111"
            expiration_date: 11/25
            security_code: "123"
            external_identifier: user-789123

responses:
  "201":
    description:
      "This API returns asynchronously, returning status object with the ID of
      the pending `Card` resource."
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Card"

  "400":
    description:
      Returns an error if the request was badly formatted or missing required
      fields.
    content:
      application/json:
        schema:
          oneOf:
            - $ref: |-
                ../openapi.yaml#/components/schemas/Error400BadRequest
            - $ref: |-
                ../openapi.yaml#/components/schemas/Error400IncorrectJson

  "401":
    description: Returns an error if no valid authentication was provided.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error401Unauthorized"
