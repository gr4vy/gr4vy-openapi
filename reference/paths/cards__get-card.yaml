---
operationId: get-card

summary: Get card
description: Gets the information about a card
tags: ["Cards"]

parameters: []

responses:
  "200":
    description: Returns the details about a tokenized card.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Card"

  "401":
    description: Returns an error if no valid authentication was provided.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error401"

  "404":
    description:
      Returns an error if the authorization can not be found or has not yet been
      created.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error"
        examples:
          Card not found:
            value:
              type: error
              code: not_found
              status: 404
              message: The resource could not be found
              additional_context: null
          Card creation pending:
            value:
              type: error
              code: status_pending
              status: 404
              message: The resource is still pending
              additional_context:
                type: status
                status: pending
                resource_type: card
                resource_id: 8724fd24-5489-4a5d-90fd-0604df7d3b83
