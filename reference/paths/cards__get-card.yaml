---
operationId: get-card

summary: Get card
description: Gets the information about a card
tags: ["Cards"]

parameters: []

responses:
  "200":
    description: Returns the details about a tokenized card.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Card"

  "401":
    description: Returns an error if no valid authentication was provided.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error401Unauthorized"

  "404":
    description:
      Returns an error if the resource can not be found or has not yet been
      created.
    content:
      application/json:
        schema:
          oneOf:
            - $ref: "../openapi.yaml#/components/schemas/Error404NotFound"
            - $ref: "../openapi.yaml#/components/schemas/Error404PendingCreation"
