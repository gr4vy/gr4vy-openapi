---
operationId: list-cards
summary: List cards
description: Returns a list of cards
tags: ["Cards"]

parameters:
  - schema:
      type: integer
      default: 100
      example: 1000
      minimum: 0
      maximum: 1000
      format: int32
    in: query
    name: limit
    description: The maximum number of items to return

  - schema:
      type: string
      format: ""
      example: "1593343179"
    in: query
    name: marker
    description: |-
      The marker that identifies the page of results to return.

      For the first page of results, simply omit this parameter.
      For next pages, simply use the value returned by the API in
      the `next_page` field.

responses:
  "200":
    description: Returns a list of cards
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Cards"

  "401":
    description: Returns an error if no valid authentication was provided.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error"
        examples:
          An unauthorized request:
            value:
              type: error
              code: unauthorized
              status: 401
              message: No valid authentication found
              additional_context: null
