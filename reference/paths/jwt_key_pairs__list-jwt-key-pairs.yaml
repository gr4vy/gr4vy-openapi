summary: List the currently active JWT key-pairs
description: Returns a list of active JWT key-pairs
tags:
  - JWT Key Pairs
x-internal: true

responses:
  "200":
    description: A list of active key pairs
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/JWTKeyPairs"
        examples:
          A list of key pairs:
            value:
              items:
                - type: jwt-key-pair
                  id: 42773804-3ceb-4851-baae-afd0d7ee37a8
                  private_key: null
                  passphrase: null
                  created_at: "2012-12-12T10:53:43-08:00"
                  updated_at: "2012-12-12T10:53:43-08:00"
                - type: jwt-key-pair
                  id: d028ec5c-12e4-43d0-b187-c6fe79b3b5dd
                  private_key: null
                  passphrase: null
                  created_at: "2012-12-12T10:53:12-08:00"
                  updated_at: "2012-12-12T10:53:12-08:00"

  "401":
    description: Returns an error if no valid authentication was provided.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error401Unauthorized"
