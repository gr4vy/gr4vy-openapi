---
operationId: authorize-payment-method
summary: Confirm user authorization
description: |-
  Confirm user authorization for a payment method. This is currently only used
  to confirm and fetch the card details for a `paypal` payment method after the
  user authorization has been completed.
tags:
  - Payment Methods

responses:
  "200":
    description: Returns the updated transaction
    content:
      application/json:
        schema:
          oneOf:
            - $ref: "../openapi.yaml#/components/schemas/PayPal"
        examples:
          An authorized PayPal payment method:
            value:
              type: payment-method
              id: 77a76f7e-d2de-4bbc-ada9-d6a0015e6bd5
              method: paypal
              status: created
              payment_method_status: registered
              details:
                authorization_url: null
              created_at: "2013-07-16T19:23:00.000Z"
              updated_at: "2013-07-16T19:23:00.000Z"
              external_identifier: user-789123
              buyer:
                type: buyer
                id: fe26475d-ec3e-4884-9553-f7356683f7f9
                external_identifier: user-789123
                display_name: John L.
                created_at: "2013-07-16T19:23:00.000Z"
                updated_at: "2013-07-16T19:23:00.000Z"

  "401":
    description: Returns an error if no valid authentication was provided.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error401Unauthorized"
