---
operationId: list-payment-methods
summary: List stored payment methods
description: Returns a list of stored payment methods
tags:
  - Payment Methods

parameters:
  - schema:
      type: integer
      default: 100
      example: 1000
      minimum: 0
      maximum: 1000
      format: int32
    in: query
    name: limit
    description: The maximum number of items to return

  - schema:
      type: string
      format: ""
      example: "1593343179"
    in: query
    name: marker
    description: |-
      The marker that identifies the page of results to return.

      For the first page of results, omit this parameter.
      For next pages, use the value returned by the API in
      the `next_page` field.

  - schema:
      type: string
      example: be828248-56de-481e-a580-44b6e1d4df81
    in: query
    name: buyer_id
    description: |-
      Filters the results to payment methods for a `buyer` that matches this
      `id`.

  - schema:
      type: string
      example: be828248-56de-481e-a580-44b6e1d4df81
    in: query
    name: buyer_external_identifier
    description: |-
      Filters the results to payment methods for a `buyer` that matches this
      `external_identifier`.

responses:
  "200":
    description: OK
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/PaymentMethods"

  "401":
    description: Returns an error if no valid authentication was provided.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error401Unauthorized"
