---
operationId: login
summary: Create a user session (Logout)
description: |
  Authenticate a user using an email address and password.
tags:
  - Sessions
x-internal: true

security: []

requestBody:
  content:
    application/json:
      schema:
        $ref: "../openapi.yaml#/components/schemas/SessionCreateRequest"

responses:
  "200":
    description: |-
      Returns a session object.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Session"

  "400":
    description:
      Returns an error if the request was badly formatted or missing required
      fields.
    content:
      application/json:
        schema:
          oneOf:
            - $ref: |-
                ../openapi.yaml#/components/schemas/Error400BadRequest
            - $ref: |-
                ../openapi.yaml#/components/schemas/Error400IncorrectJson

  "401":
    description: Returns an error if the credentials provided were not valid.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error401Unauthorized"
