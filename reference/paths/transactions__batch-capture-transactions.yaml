---
operationId: batch-capture-transactions
summary: Batch capture authorizations
tags: ["Transactions"]
description: |-
  Takes a list of authorization IDs and processes them as needed.

requestBody:
  content:
    application/json:
      schema:
        $ref: |-
          ../openapi.yaml#/components/schemas/TransactionsBatchCaptureRequest
      examples:
        Capture multiple authorizations:
          value:
            items:
              - transaction_id: 931b9b0c-dc95-4d45-b1fc-64966244ef74
                amount: 1299
                currency: USD
              - transaction_id: 272dee2b-2196-4e4e-acf7-e5983f1fdc61
                amount: 199
                currency: GBP

responses:
  "201":
    description:
      "Returns a list of status objects, one for each requested capture."
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Transactions"
        examples:
          A list of transactions:
            value:
              items:
                - type: transaction
                  id: 931b9b0c-dc95-4d45-b1fc-64966244ef74
                  status: created
                  transaction_status: authorized
                  amount: 1299
                  currency: USD
                  payment_method:
                    type: card
                    id: 77a76f7e-d2de-4bbc-ada9-d6a0015e6bd5
                    authorization_url: "https://paypal.com....."
                  created_at: "2013-07-16T19:23:00.000Z"
                  external_identifier: user-789123
                  updated_at: "2019-08-24T14:15:22Z"
                  payment_service_id: |-
                    stripe-card-169f5226-4644-4d1e-ac36-14999e73601f
                - type: transaction
                  id: 169f5226-4644-4d1e-ac36-14999e73601f
                  status: created
                  transaction_status: authorized
                  amount: 199
                  currency: GBP
                  payment_method:
                    type: card
                    id: null
                    authorization_url: "https://paypal.com....."
                  created_at: "2013-07-16T19:23:00.000Z"
                  external_identifier: user-789123
                  updated_at: "2019-08-24T14:15:22Z"
                  payment_service_id: |-
                    stripe-card-169f5226-4644-4d1e-ac36-14999e73601f
              limit: 100
              next_page: 9f944c64-eaf0-4219-90fd-f7e56c7cd214
              previous_page: 9049b2f9-0c67-47c5-af18-e8525f855263
  "400":
    description:
      "Returns an error if the request is missing any required fields, or the
      request body is not valid JSON."
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error"
        examples:
          Incorrect JSON:
            value:
              type: error
              code: incorrect_json
              status: 400
              message: The request body was not valid JSON.
              additional_context: null

  "401":
    description: Returns an error if no valid authentication was provided.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error401"

