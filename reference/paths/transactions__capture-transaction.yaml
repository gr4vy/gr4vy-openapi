---
operationId: capture-transaction
summary: Capture authorized transaction
description: Captures a previously authorized transaction.
tags: ["Transactions"]

requestBody:
  content:
    application/json:
      schema:
        $ref: "../openapi.yaml#/components/schemas/TransactionCaptureRequest"
      examples:
        Capture an authorization:
          value:
            amount: 1299
            currency: USD

responses:
  "201":
    description: A transaction
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Transaction"
        examples:
          A transaction:
            value:
              type: transaction
              id: fe26475d-ec3e-4884-9553-f7356683f7f9
              status: created
              transaction_status: authorized
              amount: 1299
              currency: USD
              payment_method:
                type: card
                id: 77a76f7e-d2de-4bbc-ada9-d6a0015e6bd5
                authorization_url: null
              created_at: "2013-07-16T19:23:00.000Z"
              external_identifier: user-789123
              updated_at: "2019-08-24T14:15:22Z"
              payment_service_id: |-
                stripe-card-169f5226-4644-4d1e-ac36-14999e73601f
  "400":
    description:
      "Returns an error if the request is missing any required fields, or the
      request body is not valid JSON."
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error"
        examples:
          Incorrect JSON:
            value:
              type: error
              code: incorrect_json
              status: 400
              message: The request body was not valid JSON.
              additional_context: null

  "401":
    description: Returns an error if no valid authentication was provided.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error401"
