---
summary: New transaction
tags: ["Transactions"]
operationId: authorize-new-transaction
description: |
  Attempts to create an authorization for a payment method. In some cases it is
  not possible to create the authorization without redirecting the user for
  their authorization. In these cases the status is set to
  `buyer_approval_pending` and an `approval_url` is returned.

  Additionally, this endpoint accepts a few additional fields that allow for
  simultaneous capturing and storage of the payment method.

  * `store` - Use this field to store the payment method for
  future use. Not all payment methods support this feature.
  * `capture` - Use this method to also perform a capture of the transaction
  after it has been authorized.

requestBody:
  content:
    application/json:
      schema:
        $ref: "../openapi.yaml#/components/schemas/TransactionRequest"
      examples:
        Authorize a new card:
          value:
            amount: 1299
            currency: USD
            payment_method:
              method: card
              number: "4111111111111111"
              expiration_date: 11/25
              security_code: "123"
        Authorized and tokenize a card:
          value:
            amount: 1299
            currency: USD
            store: true
            payment_method:
              method: card
              number: "4111111111111111"
              expiration_date: 11/25
              security_code: "123"
        "Authorize, capture, and tokenize a card":
          value:
            amount: 1299
            currency: USD
            intent: "capture"
            store: true
            payment_method:
              method: card
              number: "4111111111111111"
              expiration_date: 11/25
              security_code: "123"
        Authorize and capture a PayPal transaction:
          value:
            amount: 1299
            currency: USD
            intent: "capture"
            payment_method:
              method: paypal
              redirect_url: https://example.com/callback
        Authorize and capture using a previously tokenized card:
          value:
            amount: 1299
            currency: USD
            intent: "capture"
            payment_method:
              method: id
              id: "46973e9d-88a7-44a6-abfe-be4ff0134ff4"
        Authorize and request 3DS flow:
          value:
            amount: 1299
            currency: USD
            payment_method:
              method: card
              number: "4111111111111111"
              expiration_date: 11/25
              security_code: "123"
              redirect_url: "https://example.com/callback"
            request_three_d_secure: true
        Authorize a new card with external 3DS Data:
          value:
            amount: 1299
            currency: USD
            payment_method:
              method: card
              number: "4111111111111111"
              expiration_date: 11/25
              security_code: "123"
            three_d_secure_data:
              version: "2.1.0"
              eci: "05"
              cavv: "3q2+78r+ur7erb7vyv66vv8="
              directory_trans_id: "c4e59ceb-a382-4d6a-bc87-385d591fa09d"
              directory_response: "C"
              authentication_response: "Y"

responses:
  "201":
    description: Returns the created transaction.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Transaction"
  "400":
    description:
      Returns an error if the request was badly formatted or missing required
      fields.
    content:
      application/json:
        schema:
          x-model-name: ErrorGeneric
          oneOf:
            - $ref: |-
                ../openapi.yaml#/components/schemas/Error400BadRequest
            - $ref: |-
                ../openapi.yaml#/components/schemas/Error400IncorrectJson

  "401":
    description: Returns an error if no valid authentication was provided.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error401Unauthorized"
