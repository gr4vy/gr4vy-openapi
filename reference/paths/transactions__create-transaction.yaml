                  external_identifier: user-789123
                  display_name: John L.
                  created_at: "2013-07-16T19:23:00.000+00:00"
                  updated_at: "2013-07-16T19:23:00.000+00:00"
              created_at: "2013-07-16T19:23:00.000+00:00"
