---
operationId: list-transaction-events
summary: List transaction events
description: Returns a list of events for a given transaction.
tags:
  - Transactions

parameters:
  - schema:
      type: integer
      default: 100
      example: 1000
      minimum: 0
      maximum: 1000
      format: int32
    in: query
    name: limit
    description: The maximum number of items to return

  - schema:
      type: string
      format: ""
      example: "ZXhhbXBsZTE="
    in: query
    name: marker
    description: |-
      The marker that identifies the page of results to return.

      For the first page of results, omit this parameter.
      For next pages, use the value returned by the API in
      the `next_page` field.

responses:
  "200":
    description: OK
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/TransactionEvents"

  "401":
    description: Returns an error if no valid authentication was provided.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error401Unauthorized"

  "404":
    description:
      Returns an error if the resource can not be found or has not yet been
      created.
    content:
      application/json:
        schema:
          oneOf:
            - $ref: |-
                ../openapi.yaml#/components/schemas/Error404NotFound
            - $ref: |-
                ../openapi.yaml#/components/schemas/Error404PendingCreation
