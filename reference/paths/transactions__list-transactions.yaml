---
operationId: list-transactions
summary: List transactions
description:
  Lists all transactions for an account. Sorted by last `updated_at` status.
tags: ["Transactions"]

parameters:
  - $ref: "../parameters/limit-500.yaml"
  - $ref: "../parameters/cursor.yaml"

  - schema:
      type: string
      example: be828248-56de-481e-a580-44b6e1d4df81
    in: query
    name: search
    description:
      Filters the results to the transactions that match this external
      identifier or transaction ID.

  - schema:
      type: string
      example: "2012-12-12T10:53:43-08:00"
    in: query
    name: before_updated_at
    description:
      Filters the results to only transactions last updated before this ISO
      date-time string.

  - schema:
      type: string
      example: "2012-12-12T10:53:43-08:00"
    in: query
    name: after_updated_at
    description:
      Filters the results to only transactions last updated after this ISO
      date-time string.

  - schema:
      type: string
      example: "2012-12-12T10:53:43-08:00"
    in: query
    name: before_created_at
    description:
      Filters the results to only transactions created before this ISO date-time
      string.

  - schema:
      type: string
      example: "2012-12-12T10:53:43-08:00"
    in: query
    name: after_created_at
    description:
      Filters the results to only transactions created after this ISO date-time
      string.

  - schema:
      type: string
      example: captured
    in: query
    name: transaction_status
    description:
      Filters the results to only transactions with as specific transaction
      status.

responses:
  "200":
    description: Returns a paginated list of transactions for an account.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Transactions"

  "401":
    description: Returns an error if no valid authentication was provided.
    content:
      application/json:
        schema:
          $ref: "../openapi.yaml#/components/schemas/Error401Unauthorized"
