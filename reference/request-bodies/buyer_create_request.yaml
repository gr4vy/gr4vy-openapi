---
title: Buyer (Create)
type: object
description: A request to create a buyer.

x-tags:
  - Buyers

properties:
  external_identifier:
    type: string
    description:
      An external identifier that can be used to match the buyer against your
      own records. This value needs to be unique for all buyers.
    example: user-789123
    nullable: true
    minLength: 1
    maxLength: 200

  display_name:
    type: string
    description:
      A unique name for this buyer which is used in the Gr4vy admin panel to
      give a buyer a human readable name.
    example: John L.
    nullable: true
    minLength: 1
    maxLength: 200
