---
title: PayPal Account
type: object
description: |-
  PayPal request to use in a transaction or to register a new payment method.

x-tags:
  - Request Bodies

required:
  - method
  - redirect_url

properties:
  method:
    type: string
    description: "`paypal`."
    example: paypal
    enum:
      - paypal

  redirect_url:
    type: string
    format: uri
    description: |-
      The redirect URL to redirect a buyer to after they have authorized their
      PayPal transaction.
    example: https://example.com/callback

  external_identifier:
    type: string
    description:
      An external identifier that can be used to match the account against your
      own records.
    example: user-789123
    nullable: true

  buyer_id:
    type: string
    format: uuid
    example: fe26475d-ec3e-4884-9553-f7356683f7f9
    description: |-
      The ID of the buyer to associate this payment method to. If this field is
      provided then the `buyer_external_identifier` field needs to be unset.

  buyer_external_identifier:
    type: string
    description: |-
      The `external_identifier` of the buyer to associate this payment method
      to. If this field is provided then the `buyer_id` field
      needs to be unset.
    example: user-789123
