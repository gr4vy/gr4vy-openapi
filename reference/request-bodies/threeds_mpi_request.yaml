---
title: ThreeDSecure MPI Request
type: object
description: |-
  Request ThreeDSecure flow for a transaction.

x-tags:
  - Request Bodies

required:
  - include_flow

properties:
  include_flow:
    type: boolean
    description: |-
      Whether to include 3DS flow for transaction.
    example: true

  acquirer_bin:
    type: string
    description: |-
      The version of 3D Secure used. 
      Possible values are: 1.0, 2.0, 2.1, 2.2. 
    example: "2.1"

  acquirer_merchant_id:
    type: string
    description: |-
      The electronic commercie indidator for the 3DS transaction
    example: "05"

  acquirer_password:
    type: string
    description: |-
      The cardholder authentication value or AAV
    example: "3q2+78r+ur7erb7vyv66vv8="

  mcc:
    type: string
    description: |-
      The CAVV Algorithm used. 3DS version 1 only
    example: ""
    nullable: true

  merchant_name:
    type: string
    description:
      The transaction identifier. 3DS version 1 only
    example: ""
    nullable: true

  merchant_country:
    type: string
    description: |-
      The transaction identifier. 3DS verison 2 only
    example: "c4e59ceb-a382-4d6a-bc87-385d591fa09d"
    nullable: true

  merchant_url:
    type: string
    description: |-
      For 3DS version 1, the enrollment response.
      For 3DS version 2, the transStatus from the ARes
    example: "C"

  requestor_id:
    type: string
    description: |-
      For 3DS version 1, the authentication response.
      For 3DS version 2, the transStatus from the challenge result (not required for frictionless)
    example: "Y"

  requestor_name:
    type: string
    description: |-
      For 3DS version 1, the authentication response.
      For 3DS version 2, the transStatus from the challenge result (not required for frictionless)
    example: "Y"
