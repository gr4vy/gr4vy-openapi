---
title: Address
type: object
description: |-
  Billing details address to associate to a buyer.

x-tags:
  - Buyers

required:
  - line1
  - city
  - state
  - postal_code
  - country

properties:
  city:
    type: string
    minLength: 1
    maxLength: 100
    description: City to use for this address.
    example: London
    nullable: false

  country:
    type: string
    minLength: 1
    maxLength: 2
    description: Country to use for this address.
    example: "GB"
    nullable: false

  postal_code:
    type: string
    minLength: 1
    maxLength: 50
    description: Postal code to use for this address.
    example: "789123"
    nullable: false

  state:
    type: string
    minLength: 1
    maxLength: 255
    description: The City to use for this address.
    example: "Greater London"
    nullable: false

  house_number_or_name:
    type: string
    minLength: 1
    maxLength: 255
    description: The house number or name to use for this address.
    example: "10"
    nullable: true

  line1:
    type: string
    minLength: 1
    maxLength: 255
    description: The first line of the address to use for this address.
    example: "10 Oxford Street"
    nullable: false

  line2:
    type: string
    minLength: 1
    maxLength: 255
    description: The second line of the address to use for this address.
    example: "New Oxford Court"
    nullable: true

  organization:
    type: string
    minLength: 1
    maxLength: 255
    description: The second line of the address to use for this address.
    example: "Gr4vy"
    nullable: true
