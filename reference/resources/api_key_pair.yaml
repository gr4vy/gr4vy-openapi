---
title: API Key Pair
type: object
description: Details about an API key pair.
x-internal: true

x-tags:
  - API Key Pairs

properties:
  type:
    type: string
    description: "`api-key-pair`."
    example: api-key-pair
    enum:
      - api-key-pair

  id:
    type: string
    format: uuid
    description: A unique ID for this key-pair.
    example: 86473d2b-e385-4d5a-85e3-36964c5ed41c

  private_key:
    type: string
    nullable: true
    description: |-
      The private key for the key-pair. This is only returned after
      the key is initially requested. For subsequent API calls this value is
      `null`.
    example: |-
      -----BEGIN PRIVATE KEY-----
      ...
      -----END PRIVATE KEY-----

  created_at:
    type: string
    format: date-time
    example: "2012-12-12T10:53:43+00:00"
    description: The date and time when this key pair was created.

  updated_at:
    type: string
    format: date-time
    example: "2012-12-12T10:53:43+00:00"
    description: The date and time when this key pair was last updated.
