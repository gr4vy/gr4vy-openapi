---
title: Billing details request
type: object
description: |-
  Billing details to use associated to a buyer.

x-tags:
  - Buyers

properties:
  first_name:
    type: string
    minLength: 1
    maxLength: 255
    description: First name to use for this request.
    example: John
    nullable: true

  last_name:
    type: string
    minLength: 1
    maxLength: 255
    example: Lunn
    description: Last name to use for this request.
    nullable: true

  email:
    type: string
    minLength: 1
    maxLength: 320
    description: Email to use for this request.
    example: john@example.com
    nullable: true

  phone_number:
    type: string
    pattern: '^\+[1-9]\d{1,14}$'
    minLength: 1
    maxLength: 50
    description: Phone number to use for this request following E.164 international standard.
    example: "+1234567890"
    nullable: true

  address:
    description: Address associated with the billing details.
    nullable: true
    allOf:
      - $ref: "../openapi.yaml#/components/schemas/Address"

  tax_id:
    description: Tax information associated with the billing details.
    nullable: true
    allOf:
      - $ref: "../openapi.yaml#/components/schemas/TaxId"
