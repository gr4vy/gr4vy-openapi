---
title: Card details
description: Additional details about a stored card.
type: object
x-tags:
  - Payment Methods

properties:
  suffix:
    type: string
    description: |-
      The last 4 digits of the card number.
    example: "1111"

  scheme:
    type: string
    example: visa
    enum:
      - visa
      - mastercard
      - american-express
      - diners-club
      - discover
      - jcb
      - unionpay
      - maestro
      - elo
      - mir
      - hiper
      - hipercard
    description: |-
      The type of the card.

  expiration_date:
    type: string
    description: |-
      The expiration date for a card.
    example: "11/25"
    pattern: ^\d{2}/\d{2}$
    minLength: 5
    maxLength: 5
