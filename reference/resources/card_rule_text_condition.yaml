---
title: Card rule (Text)
type: object
description: |-
  Part of a rule that matches text fields. It defines the condition under
  which this rule applies.
x-tags:
  - Card Rules

required:
  - match
  - key
  - operator
  - values

properties:
  match:
    type: string
    description: "`text`."
    example: text
    enum:
      - text

  key:
    type: string
    description: The transaction field to filter by.
    example: currency
    enum:
      - currency
      - card_scheme

  operator:
    type: string
    description: The comparison to make to `value` property.
    example: "IN"
    enum:
      - "IN"
      - "NOT IN"

  values:
    type: array
    minItems: 1
    maxItems: 100
    items:
      type: string
      minLength: 1
      maxLength: 50
    description: |-
      The values to compare the `key` to.
    example:
      - USD
      - EUR
      - amex
      - visa
