---
# yamllint disable rule:line-length
title: Card Ruleset
type: object
description: |-
  A card ruleset which holds the rules that are parsed for a card transaction.

  Multiple rulesets can exists at any time, but only one can be deployed.
x-internal: true
x-tags:
  - Card Rulesets

properties:
  type:
    type: string
    example: ruleset
    description: "`ruleset`"
    enum:
      - ruleset
  id:
    type: string
    example: 8d3fe99b-1422-42e6-bbb3-932d95ae5f79
    description: The ID of the ruleset
    format: uuid
  display_name:
    type: string
    description: The display name of the ruleset
    example: Q2 2020 Ruleset
    minLength: 1
    maxLength: 50
  active:
    type: boolean
    example: true
    description: |-
      Whether this ruleset is currently in use. Only one ruleset can
      be active at any time.
  valid:
    type: boolean
    example: true
    description: |-
      Whether this ruleset is valid and complete. Only valid rulesets can be
      activated.
  root_rule_id:
    type: string
    example: "rule-0"
    description: The ID of the rule that is the starting point of the ruleset.
    minLength: 1
    maxLength: 50
  rules:
    type: array
    description: A list of rules in this ruleset
    items:
      oneOf:
        - $ref: "../openapi.yaml#/components/schemas/CardRuleStringConditional"
        - $ref: "../openapi.yaml#/components/schemas/CardRuleNumberConditional"
        - $ref: "../openapi.yaml#/components/schemas/CardRuleBooleanConditional"
        - $ref: "../openapi.yaml#/components/schemas/CardRulePaymentServicesTerminal"

  created_at:
    type: string
    format: date-time
    example: "2012-12-12T10:53:43-08:00"
    description: The date and time when this ruleset was created

  updated_at:
    type: string
    format: date-time
    example: "2012-12-12T10:53:43-08:00"
    description: The date and time when this ruleset was last updated
