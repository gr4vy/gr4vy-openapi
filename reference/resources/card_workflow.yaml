---
# yamllint disable rule:line-length
title: Card Workflow
type: object
description: |-
  A card workflow which holds the rules that are parsed for a card transaction.

  Multiple workflows can exists at any time, but only one can be deployed.
x-internal: true
x-tags:
  - Card Workflows

properties:
  type:
    type: string
    example: workflow
    description: "`workflow`"
    enum:
      - workflow
  id:
    type: string
    example: 8d3fe99b-1422-42e6-bbb3-932d95ae5f79
    description: The ID of the workflow
    format: uuid
  display_name:
    type: string
    description: The display name of the workflow
    example: Q2 2020 Workflow
    minLength: 1
    maxLength: 50
  active:
    type: boolean
    example: true
    description: |-
      Whether this workflow is currently in use. Only one workflow can
      be active at any time.
  valid:
    type: boolean
    example: true
    description: |-
      Whether this workflow is valid and complete. Only valid workflows can be
      activated.
  root_rule_id:
    type: string
    example: "rule-0"
    description: The ID of the rule that is the starting point of the workflow.
    minLength: 1
    maxLength: 50
  rules:
    type: array
    description: A list of rules in this workflow
    items:
      oneOf:
        - $ref: "../openapi.yaml#/components/schemas/CardRuleStringConditional"
        - $ref: "../openapi.yaml#/components/schemas/CardRuleNumberConditional"
        - $ref: "../openapi.yaml#/components/schemas/CardRuleBooleanConditional"
        - $ref: "../openapi.yaml#/components/schemas/CardRulePaymentServicesTerminal"

  created_at:
    type: string
    format: date-time
    example: "2012-12-12T10:53:43-08:00"
    description: The date and time when this workflow was created

  updated_at:
    type: string
    format: date-time
    example: "2012-12-12T10:53:43-08:00"
    description: The date and time when this workflow was last updated
