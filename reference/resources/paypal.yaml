---
title: PayPal Account
description: A stored PayPal account.
type: object
x-tags:
  - Payment Methods

properties:
  type:
    type: string
    description: "`payment-method`."
    example: payment-method
    enum:
      - payment-method

  id:
    type: string
    description: |-
      The unique ID of the payment method.
    format: uuid
    example: 77a76f7e-d2de-4bbc-ada9-d6a0015e6bd5

  status:
    type: string
    description: |-
      The state of the account tokenization. After the first call this will
      be set to `buyer_approval_pending` and the response will include
      an `approval_url`. The buyer needs to be redirected to this URL
      to authorize the future payments.
    example: buyer_approval_pending
    enum:
      - processing
      - processing_failed
      - buyer_approval_pending
      - buyer_approval_declined
      - buyer_approval_timedout
      - buyer_approved
      - stored
      - used

  token:
    type: string
    description: |-
      A Gr4vy token that represents this payment method, in the format of a
      credit-card number starting with the digit 0. You can store this token
      in your own system and use it to process a payment with this payment
      method at a later date.
    example: "0123456789123458"
    nullable: true

  method:
    type: string
    description: "`paypal`."
    example: paypal
    enum:
      - paypal

  created_at:
    type: string
    description: |-
      The date and time when this payment method was first created in our
      system.
    format: date-time
    example: "2013-07-16T19:23:00.000+00:00"

  updated_at:
    type: string
    description: |-
      The date and time when this payment method was last updated in our system.
    format: date-time
    example: "2013-07-16T19:23:00.000+00:00"

  external_identifier:
    type: string
    description: |-
      An external identifier that can be used to match the payment method
      against your own records.
    example: user-789123
    nullable: true

  buyer:
    description: |-
      The optional buyer for which this payment method has been stored.
    nullable: true
    allOf:
      - $ref: "../openapi.yaml#/components/schemas/Buyer"

  details:
    $ref: |-
      ../openapi.yaml#/components/schemas/PayPalDetails

  environment:
    type: string
    example: production
    default: production
    nullable: true
    enum:
      - development
      - staging
      - production
    description: |-
      The environment this payment method has been stored for. This will be null
      of the payment method was not stored.
