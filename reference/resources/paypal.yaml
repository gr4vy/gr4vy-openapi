---
title: PayPal Account
description: A stored PayPal account.
type: object
x-tags:
  - Payment Methods

properties:
  type:
    type: string
    description: "`payment-method`."
    example: payment-method
    enum:
      - payment-method

  id:
    type: string
    description: |-
      The unique ID of the payment method.
    format: uuid
    example: 77a76f7e-d2de-4bbc-ada9-d6a0015e6bd5

  status:
    type: string
    description: |-
      The state of the account tokenization. After the first call this will
      be set to `buyer_approval_pending` and the response will include
      an `approval_url`. The buyer needs to be redirected to this URL
      to authorize the future payments.
    example: buyer_approval_pending
    enum:
      - processing
      - processing_failed
      - buyer_approval_pending
      - buyer_approval_declined
      - buyer_approval_timedout
      - buyer_approved
      - stored
      - used

  method:
    type: string
    description: "`paypal`."
    example: paypal
    enum:
      - paypal

  created_at:
    type: string
    description: |-
      The date and time when this payment method was first created in our
      system.
    format: date-time
    example: "2013-07-16T19:23:00.000+00:00"

  updated_at:
    type: string
    description: |-
      The date and time when this payment method was last updated in our system.
    format: date-time
    example: "2013-07-16T19:23:00.000+00:00"

  external_identifier:
    type: string
    description: |-
      An external identifier that can be used to match the payment method
      against your own records.
    example: user-789123
    nullable: true

  buyer:
    description: |-
      The optional buyer for which this payment method has been stored.
    nullable: true
    allOf:
      - $ref: "../openapi.yaml#/components/schemas/Buyer"

  label:
    type: string
    description: |-
      A label for the PayPal account. For a `paypal` payment method this is the
      user's email address.
    example: "john@example.com"

  scheme:
    type: string
    example: null
    nullable: true
    description: |-
      An optional scheme. Not used for PayPal payment methods.

  expiration_date:
    type: string
    description: |-
      The expiration date for the payment method. Not used for PayPal payment
      methods.
    example: null
    pattern: ^\d{2}/\d{2}$
    minLength: 5
    maxLength: 5
    nullable: true

  approval_url:
    type: string
    format: uri
    example: |-
      https://api.{merchant}.app.gr4vy.com/payment-methods/ffc88ec9-e1ee-45ba-993d-b5902c3b2a8c/approve
    description:
      The optional URL that the buyer needs to be redirected to to further
      authorize their payment.
    nullable: true

  environment:
    type: string
    example: production
    default: production
    nullable: true
    enum:
      - development
      - staging
      - production
    description: |-
      The environment this payment method has been stored for. This will be null
      of the payment method was not stored.
