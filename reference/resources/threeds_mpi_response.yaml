---
title: ThreeDSecure MPI Response
type: object
description: |-
  Response ThreeDSecure flow for a transaction.

x-tags:
  - ThreeDSecure

required:
  - included

properties:
  included:
    type: boolean
    description: |-
      Whether to 3DS flow was included in the transaction.
    example: true

  threeds_token:
    type: string
    description: |-
      A token used in 3D Secure flow
    example: "3q2+78r+ur7erb7vyv66vv8="

  threeds_server_transaction_id:
    type: string
    description: |-
      A transaction identifer for the MPI server
    example: "3q2+78r+ur7erb7vyv66vv8="

  threeds_acs_transaction_id:
    type: string
    description: |-
      A transaction identifer for the ACS
    example: "3q2+78r+ur7erb7vyv66vv8="

  threeds_version:
    type: string
    description: |-
      The 3D Secure version
    example: "2.1.0"

