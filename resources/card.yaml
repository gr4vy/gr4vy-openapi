---
title: Card
description: A stored card
type: object
x-tags:
  - Payment Methods

properties:
  type:
    type: string
    description: "`payment-method`"
    example: payment-method
    enum:
      - payment-method

  id:
    type: string
    description: |-
      The unique ID of the payment method.
    format: uuid
    example: 77a76f7e-d2de-4bbc-ada9-d6a0015e6bd5

  status:
    type: string
    description: |-
      The state of the payment method in Gr4vy.
    example: created

  payment_method_status:
    type: string
    description: |-
      The state of the card tokenization.
    example: tokenized
    enum:
      - tokenized
      - not_tokenized

  token:
    type: string
    description: |-
      A Gr4vy token that represents this payment method, in the format of a
      credit-card number starting with the digit 0. You can store this token
      in your own system and use it to process a payment with this payment
      method at a later date.
    example: "0123456789123458"
    nullable: true

  method:
    type: string
    description: "`card`"
    example: card
    enum:
      - card

  created_at:
    type: string
    description: |-
      The date and time when this payment method was first created in our
      system.
    format: date-time
    example: "2013-07-16T19:23:00.000Z"

  updated_at:
    type: string
    description: |-
      The date and time when this payment method was last updated in our system.
    format: date-time
    example: "2013-07-16T19:23:00.000Z"

  external_identifier:
    type: string
    description: |-
      An external identifier that can be used to match the payment method
      against your own records.
    example: user-789123
    nullable: true

  buyer:
    allOf:
      - $ref: "../openapi.yaml#/components/schemas/Buyer"
      - description: |-
          The optional buyer for which this payment method has been stored.
      - nullable: true

  details:
    $ref: |-
      ../openapi.yaml#/components/schemas/CardDetails
